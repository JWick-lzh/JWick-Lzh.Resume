<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>鲜达 AI 智能订单助手</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%232f6fed'/><text x='50' y='68' font-size='52' text-anchor='middle' fill='white' font-family='Arial' font-weight='bold'>AI</text></svg>">
<style>
  :root{
    --blue:#2f6fed; --blue-dark:#245bd0; --blue-soft:#eaf1fe;
    --navy:#20304f; --navy-hi:#2c4372;
    --green:#2ba471; --green-soft:#e8f8ef;
    --amber:#d48806; --amber-soft:#fff7e6;
    --red:#e5484d; --red-soft:#fff1f0;
    --purple:#7b61e0; --purple-soft:#f1edfd;
    --t1:#1d2129; --t2:#4e5969; --t3:#86909c; --t4:#c1c7cf;
    --border:#e9ebef; --border-lt:#f0f1f3;
    --bg:#f4f6f9; --card:#fff;
    --shadow:0 1px 2px rgba(20,30,60,.04),0 6px 18px rgba(20,30,60,.05);
    --font:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei","Segoe UI",Roboto,Arial,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:var(--font);color:var(--t1);background:var(--bg);font-size:13px;-webkit-font-smoothing:antialiased;overflow:hidden}
  ::-webkit-scrollbar{width:9px;height:10px}
  ::-webkit-scrollbar-thumb{background:#d3d7de;border-radius:6px}::-webkit-scrollbar-thumb:hover{background:#bcc1c9}
  ::-webkit-scrollbar-track{background:transparent}
  button{font-family:inherit;cursor:pointer;border:none;background:none}
  input,textarea,select{font-family:inherit;outline:none;border:none;background:none;color:var(--t1);font-size:13px}
  a{color:var(--blue);cursor:pointer;text-decoration:none}
  .app{display:flex;height:100vh}

  /* 全局交互：小手 + 悬停 + 按压回弹 */
  [onclick],[role=button],button,a,select,.item,.mod,.citem,.tab,.stab,.dtabs span,.segs button,.sw,.gcard,input[type=checkbox]{cursor:pointer}
  input[type=text],input[type=date],input[type=password],textarea{cursor:text}
  button,a,.btn,.item,.mod,.citem,.tab,.stab,.dtabs span,.segs button,.rowop button,.addprod,.addgroup,.op-links a,.sw,.gcard,[onclick]{transition:transform .12s ease,background .15s ease,color .15s ease,box-shadow .15s ease,opacity .12s ease,border-color .15s ease}
  button:active,.btn:active,.mod:active,.citem:active,.stab:active,.addprod:active,.addgroup:active,.rowop button:active,.gcard:active,[onclick]:active{transform:translateY(1px) scale(.985)}
  .btn:active{opacity:.9}
  .mod:hover .ic{transform:translateY(-3px);box-shadow:0 10px 20px rgba(40,60,120,.22)}
  .mod .ic{transition:transform .15s ease,box-shadow .15s ease}
  .op-links a:hover{text-decoration:underline}
  a:active{opacity:.7}

  /* 图标导航（深色） */
  .rail{width:60px;flex-shrink:0;background:var(--navy);display:flex;flex-direction:column;align-items:center;padding-top:12px;overflow-y:auto}
  .rail::-webkit-scrollbar{width:0}
  .rail .logo{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,#4d8bff,#2f6fed);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;margin-bottom:16px;flex-shrink:0}
  .rail .item{width:46px;height:46px;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;color:#9fb0cc;margin-bottom:3px;flex-shrink:0}
  .rail .item svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.7}
  .rail .item span{font-size:10px}
  .rail .item:hover{background:var(--navy-hi);color:#dbe5f5}
  .rail .item.on{background:var(--blue);color:#fff}

  .body{flex:1;display:flex;flex-direction:column;min-width:0}
  .topbar{height:44px;flex-shrink:0;background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 18px;gap:12px}
  .topbar .brand{font-weight:600}
  .topbar .spacer{flex:1}
  .topbar .me{display:flex;align-items:center;gap:8px;color:var(--t2)}
  .topbar .avatar{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,#9db4de,#6f8fce);display:flex;align-items:center;justify-content:center}
  .topbar .avatar svg{width:14px;height:14px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round}
  .tabbar{height:38px;flex-shrink:0;background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:flex-end;padding:0 14px;gap:4px}
  .tabbar .tab{display:flex;align-items:center;gap:7px;padding:7px 14px;color:var(--t2);border:1px solid transparent;border-bottom:none;border-radius:8px 8px 0 0}
  .tabbar .tab.on{color:var(--blue);background:var(--bg);border-color:var(--border)}
  .tabbar .home-ic{color:var(--t3);padding:7px 10px}
  .view{flex:1;overflow:auto;min-height:0}

  /* 通用组件 */
  .btn{height:32px;padding:0 16px;border-radius:7px;font-size:13px;display:inline-flex;align-items:center;gap:5px;justify-content:center;white-space:nowrap}
  .btn.pri{background:var(--blue);color:#fff}.btn.pri:hover{background:var(--blue-dark)}
  .btn.pri:disabled{background:#b9cdf5;cursor:not-allowed}
  .btn.ghost{border:1px solid var(--border);color:var(--t2);background:#fff}.btn.ghost:hover{border-color:var(--blue);color:var(--blue)}
  .btn.danger{border:1px solid #ffccc7;color:var(--red);background:#fff}.btn.danger:hover{background:var(--red-soft)}
  .btn.sm{height:26px;padding:0 10px;font-size:12px;border-radius:6px}
  .badge{font-size:12px;padding:1px 8px;border-radius:5px;font-weight:500;white-space:nowrap}
  .badge.pending{color:var(--amber);background:var(--amber-soft)}
  .badge.done{color:var(--green);background:var(--green-soft)}
  .badge.failed{color:var(--red);background:var(--red-soft)}
  .badge.merged{color:var(--purple);background:var(--purple-soft)}
  .badge.processing{color:var(--blue);background:var(--blue-soft)}
  .badge.wx{color:#2ba471;background:var(--green-soft)}
  .badge.mail{color:#d46b08;background:#fff3e8}
  .badge.gray{color:var(--t3);background:var(--bg)}
  .ipt{height:32px;border:1px solid var(--border);border-radius:7px;padding:0 10px;background:#fff;color:var(--t1)}
  .ipt:focus{border-color:#a9c6ff}
  select.ipt{padding:0 6px}
  .sw{width:36px;height:20px;border-radius:12px;background:#cdd3dc;position:relative;display:inline-block;vertical-align:middle}
  .sw::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:#fff;transition:.18s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
  .sw.on{background:var(--green)}
  .sw.on::after{left:18px}
  .statbar{display:flex;align-items:center;gap:10px;color:var(--t2);font-size:13px;padding:2px 0}
  .statbar b{font-size:16px;color:var(--t1)}
  .statbar .sep{color:var(--border);margin:0 4px}
  .pagefoot{display:flex;justify-content:space-between;align-items:center;padding:12px 18px;color:var(--t3);font-size:12px;border-top:1px solid var(--border-lt)}
  .pagefoot .pg{display:flex;gap:6px;align-items:center}
  .pagefoot .pg span{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;background:var(--blue);color:#fff}
  .ellipsis{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

  /* 首页 */
  .home{padding:18px 22px;max-width:1400px;width:100%;margin:0 auto}
  @media (max-width:900px){
    .home{padding:14px}
    .banner{padding:20px 18px}
    .row2{grid-template-columns:1fr}
    .stats .s b{font-size:24px}
  }
  .banner{background:linear-gradient(120deg,#dbe7fb,#eef4fe 60%,#f3f0fe);border-radius:14px;padding:26px 30px;margin-bottom:16px}
  .banner h1{font-size:24px;margin-bottom:6px}
  .banner .date{color:var(--t3);margin-bottom:20px}
  .mods{display:flex;gap:14px;flex-wrap:wrap}
  .mod{width:78px;display:flex;flex-direction:column;align-items:center;gap:8px}
  .mod .ic{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;color:#fff;box-shadow:0 6px 14px rgba(40,60,120,.15)}
  .mod .ic svg{width:24px;height:24px;stroke:#fff;fill:none;stroke-width:1.8}
  .mod span{font-size:13px;color:var(--t2)}
  .mod:hover span{color:var(--blue)}
  .row2{display:grid;grid-template-columns:1.6fr 1fr;gap:16px;margin-top:16px}
  .panel{background:#fff;border-radius:12px;padding:20px 22px;box-shadow:var(--shadow)}
  .panel .ph{display:flex;align-items:center;gap:8px;font-weight:600;font-size:15px;margin-bottom:18px}
  .panel .ph .sp{flex:1}
  .stats{display:flex}
  .stats .s{flex:1;text-align:center;border-right:1px solid var(--border-lt)}
  .stats .s:last-child{border:none}
  .stats .s b{display:block;font-size:30px;font-weight:700}
  .stats .s.p b{color:var(--blue)} .stats .s.d b{color:var(--green)} .stats .s.f b{color:var(--red)} .stats .s.a b{color:var(--t1)}
  .stats .s span{color:var(--t3);font-size:13px}
  .quota .big{font-size:34px;font-weight:800;color:var(--blue);margin-bottom:2px}
  .quota .bar{height:8px;background:#eef1f6;border-radius:6px;margin:14px 0 8px;overflow:hidden}
  .quota .bar i{display:block;height:100%;width:98%;background:linear-gradient(90deg,#4d8bff,#2f6fed)}
  .quota .qf{display:flex;justify-content:space-between;color:var(--t3);font-size:12px}
  .gboard{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
  .gcard{border:1px solid var(--border);border-radius:10px;padding:13px 15px}
  .gcard:hover{border-color:#bcd4ff;box-shadow:var(--shadow)}
  .gcard .gn{font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:7px}
  .gcard .gm{display:flex;gap:14px;color:var(--t3);font-size:12px}
  .gcard .gm b{color:var(--t1)}

  /* 订单录入 */
  .luru{display:flex;height:100%}
  .cust{width:280px;flex-shrink:0;background:#fff;border-right:1px solid var(--border);display:flex;flex-direction:column;min-height:0}
  .cust .ch{padding:16px 16px 10px}
  .cust .ch .tt{font-size:18px;font-weight:700;display:flex;align-items:center;gap:8px}
  .cust .ch .tt .ai{background:var(--blue);color:#fff;font-size:11px;padding:1px 7px;border-radius:5px;font-weight:600}
  .segs{display:flex;background:var(--bg);border-radius:8px;padding:3px;margin-top:12px}
  .segs button{flex:1;height:28px;border-radius:6px;font-size:13px;color:var(--t2)}
  .segs button.on{background:#fff;color:var(--blue);font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.06)}
  .search{margin:10px 16px;height:34px;border:1px solid var(--border);border-radius:8px;display:flex;align-items:center;gap:7px;padding:0 10px;color:var(--t3)}
  .search svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.8}
  .search input{flex:1}
  .clist{flex:1;overflow-y:auto;padding:0 8px 12px}
  .citem{padding:11px 12px;border-radius:9px;border:1px solid transparent}
  .citem:hover{background:var(--bg)}
  .citem.on{background:var(--blue-soft);border-color:#bcd4ff}
  .citem .cn{font-weight:600;margin-bottom:3px}
  .citem .cid{font-size:12px;color:var(--t4)}
  .chat{flex:1;display:flex;flex-direction:column;min-width:0;background:linear-gradient(180deg,#fbfcff,#f4f7fc)}
  .chat .msgs{flex:1;overflow-y:auto;padding:26px;display:flex;flex-direction:column}
  .hero{margin:auto;text-align:center;max-width:520px}
  .hero .ic{width:78px;height:78px;border-radius:50%;background:var(--blue-soft);display:flex;align-items:center;justify-content:center;margin:0 auto 22px}
  .hero .ic svg{width:34px;height:34px;stroke:var(--blue);fill:none;stroke-width:1.6}
  .hero h2{font-size:22px;margin-bottom:12px}
  .hero p{color:var(--t3);line-height:1.9}
  .msg{display:flex;gap:11px;margin-bottom:18px;max-width:760px}
  .msg .ava{width:32px;height:32px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
  .msg.ai .ava{background:var(--blue-soft);color:var(--blue)} .msg.me{flex-direction:row-reverse;margin-left:auto}
  .msg.me .ava{background:#fff0e0;color:#f79b3d}
  .msg .ava svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.7}
  .bub{background:#fff;border:1px solid var(--border);border-radius:12px;padding:12px 15px;line-height:1.7;box-shadow:var(--shadow);white-space:pre-wrap}
  .msg.me .bub{background:var(--blue);color:#fff;border-color:var(--blue)}
  .resultcard{border:1px solid var(--border);border-radius:11px;padding:14px 16px;margin-top:10px;background:#fff;box-shadow:var(--shadow);max-width:520px}
  .resultcard .rt{font-weight:600;margin-bottom:6px}
  .resultcard .rmeta{color:var(--t3);font-size:12px;margin-bottom:10px}
  .composer{flex-shrink:0;padding:14px 26px 22px}
  .composer .box{background:#fff;border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow);padding:12px 14px}
  .composer .box:focus-within{border-color:#a9c6ff}
  .composer textarea{width:100%;height:60px;resize:none;line-height:1.6}
  .composer textarea::placeholder{color:var(--t4)}
  .composer .cf{display:flex;justify-content:flex-end;align-items:center;gap:10px;margin-top:6px}
  .composer .up{width:32px;height:32px;border-radius:8px;color:var(--t3);display:flex;align-items:center;justify-content:center}
  .composer .up:hover{background:var(--bg);color:var(--blue)}
  .composer .up svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:1.7}
  .composer .tip{text-align:center;color:var(--t4);font-size:12px;margin-top:8px}

  /* 列表页通用 */
  .wrap{padding:16px 18px}
  .filters{background:#fff;border-radius:10px;padding:14px 16px;box-shadow:var(--shadow);display:grid;grid-template-columns:repeat(4,1fr);gap:12px 16px;margin-bottom:14px}
  .fld{display:flex;align-items:center;gap:8px}
  .fld>label{color:var(--t2);white-space:nowrap}
  .fld .ipt,.fld select{flex:1;height:32px;border:1px solid var(--border);border-radius:7px;padding:0 10px;background:#fff}
  .fld.acts{justify-content:flex-end;gap:8px}
  .daterange{flex:1;display:flex;align-items:center;gap:6px}
  .daterange .ipt{flex:1;min-width:0}
  .listcard{background:#fff;border-radius:10px;box-shadow:var(--shadow);overflow:hidden}
  .lc-head{display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:1px solid var(--border-lt)}
  .lc-head b{font-size:15px}
  .lc-head .sp{flex:1}
  .alert{margin:12px 18px 0;background:var(--amber-soft);border:1px solid #ffe7ba;border-radius:8px;padding:8px 14px;color:#8c5800}
  .stabs{display:flex;gap:6px;padding:12px 18px 4px}
  .stab{padding:5px 14px;border-radius:7px;color:var(--t2);background:var(--bg)}
  .stab.on{background:var(--blue-soft);color:var(--blue);font-weight:600}
  .stab b{margin-left:6px}
  table{width:100%;border-collapse:collapse}
  thead th{text-align:left;font-weight:600;color:var(--t2);padding:12px 14px;border-bottom:1px solid var(--border);white-space:nowrap;background:#fafbfc}
  tbody td{padding:11px 14px;border-bottom:1px solid var(--border-lt);vertical-align:middle}
  tbody tr:hover{background:#fafcff}
  .txt-ell{max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--t2)}
  .op-links a{margin-right:12px;white-space:nowrap}
  .op-links a.del{color:var(--red)}
  .rev-sel{height:28px;border:1px solid var(--border);border-radius:6px;padding:0 6px;background:#fff;cursor:pointer}
  .empty{padding:60px;text-align:center;color:var(--t4)}
  .prio{display:inline-flex;background:var(--bg);border-radius:7px;padding:2px}
  .prio span{padding:3px 9px;border-radius:5px;color:var(--t3);font-size:12px;cursor:pointer}
  .prio span.on{background:#fff;color:var(--blue);font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.08)}

  /* 任务详情 */
  .detail{display:flex;height:100%;min-height:0}
  .dleft{width:320px;flex-shrink:0;background:#fff;border-right:1px solid var(--border);overflow-y:auto;padding:16px}
  .dtabs{display:flex;gap:16px;border-bottom:1px solid var(--border);padding-bottom:10px;margin-bottom:14px}
  .dtabs span{color:var(--t3)}
  .dtabs span.on{color:var(--blue);font-weight:600}
  .sec-t{text-align:center;color:var(--t3);font-size:12px;margin:16px 0 10px}
  .file{border:1px solid var(--border);border-radius:9px;padding:12px 14px;display:flex;align-items:center;gap:10px}
  .file .fi{width:30px;height:30px;border-radius:7px;background:var(--blue-soft);color:var(--blue);display:flex;align-items:center;justify-content:center}
  .file .fi svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.7}
  .file .fn{flex:1;font-weight:500;word-break:break-all}
  .rawmsg{background:var(--bg);border-radius:9px;padding:13px 14px;line-height:1.9;color:var(--t2);white-space:pre-wrap;transition:box-shadow .3s}
  .rawmsg.flash{box-shadow:0 0 0 3px var(--blue-soft);background:var(--blue-soft)}
  .wxmsg{display:flex;gap:9px;margin-bottom:14px}
  .wxmsg .wava{width:30px;height:30px;border-radius:7px;background:#e6f4ea;color:#2ba471;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
  .wxmsg .wb{background:var(--bg);border-radius:0 10px 10px 10px;padding:9px 12px;line-height:1.7;color:var(--t1);white-space:pre-wrap;max-width:230px}
  .wxmsg .wname{font-size:11px;color:var(--t4);margin-bottom:3px}
  .dmain{flex:1;overflow-y:auto;padding:16px 20px;min-width:0}
  .dm-head{display:flex;align-items:center;gap:10px;margin-bottom:6px}
  .dm-head b{font-size:16px}
  .dm-head .sp{flex:1}
  .dm-meta{display:flex;gap:34px;color:var(--t3);margin-bottom:16px;flex-wrap:wrap}
  .dm-meta b{color:var(--t1);font-weight:500}
  .group{border:1px solid var(--border);border-radius:11px;margin-bottom:16px;overflow:hidden;box-shadow:var(--shadow)}
  .g-head{display:flex;align-items:center;gap:10px;padding:12px 16px;background:#fafbfd;border-bottom:1px solid var(--border-lt)}
  .g-head .gt{font-weight:600}
  .g-head .cnt{color:var(--blue);font-size:12px}
  .g-head .sp{flex:1}
  .g-form{display:flex;flex-wrap:wrap;gap:12px 20px;padding:14px 16px 4px;align-items:center}
  .g-form .gf{display:flex;align-items:center;gap:8px}
  .g-form .gf label{color:var(--t2);white-space:nowrap}
  .g-form .gf .ipt{height:30px}
  .gm-rec{color:var(--blue);background:var(--blue-soft);font-size:12px;padding:3px 9px;border-radius:6px}
  .itbl{padding:8px 16px 14px}
  .itbl th{background:transparent;border-bottom:1px solid var(--border);padding:8px 8px;font-size:12px}
  .itbl td{padding:6px 8px;border-bottom:1px solid var(--border-lt)}
  .itbl .ci{width:100%;border:1px solid var(--border);border-radius:6px;height:32px;padding:0 8px}
  .itbl .ci:focus{border-color:#a9c6ff}
  .itbl .qn{width:64px}.itbl .un{width:48px}.itbl .pn{width:72px}
  .itbl tr.warn td{background:#fff8f8}
  .rowop{display:flex;gap:6px}
  .rowop button{width:22px;height:22px;border-radius:50%;color:#fff;font-size:15px;display:flex;align-items:center;justify-content:center}
  .rowop .add{background:var(--blue)} .rowop .del{background:#f56c6c}
  .addprod{color:var(--blue);text-align:center;padding:9px}
  .addprod:hover{background:var(--blue-soft)}
  .addgroup{border:1px dashed var(--border);border-radius:10px;text-align:center;padding:12px;color:var(--t2)}
  .addgroup:hover{border-color:var(--blue);color:var(--blue)}
  .warntip{color:var(--amber);font-size:11px;margin-left:4px}

  /* 设置页 */
  .settabs{display:flex;gap:4px;padding:0 18px;background:#fff;border-radius:10px 10px 0 0;border-bottom:1px solid var(--border)}
  .settabs span{padding:13px 16px;color:var(--t2);border-bottom:2px solid transparent;margin-bottom:-1px}
  .settabs span.on{color:var(--blue);font-weight:600;border-color:var(--blue)}
  .setbody{background:#fff;border-radius:0 0 10px 10px;box-shadow:var(--shadow);padding:20px}
  .setrow{display:flex;align-items:center;gap:14px;padding:14px 4px;border-bottom:1px solid var(--border-lt)}
  .setrow:last-child{border:none}
  .setrow .st{flex:1}

  /* 弹窗 */

  @keyframes pop{from{transform:scale(.96);opacity:0}to{transform:scale(1);opacity:1}}
  .m-head{display:flex;align-items:center;padding:16px 20px;border-bottom:1px solid var(--border-lt)}

  .toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-16px);background:#fff;border:1px solid var(--border);box-shadow:0 8px 30px rgba(20,30,60,.16);border-radius:10px;padding:10px 20px;display:flex;align-items:center;gap:9px;opacity:0;pointer-events:none;transition:.25s;z-index:99}

  .loading{position:fixed;inset:0;background:rgba(255,255,255,.55);display:none;align-items:center;justify-content:center;z-index:98}

  .spin{width:34px;height:34px;border:3px solid var(--blue-soft);border-top-color:var(--blue);border-radius:50%;animation:sp .8s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}

  /* 右下角常驻：智能问答 + 帮助文档 */
  .fabs{position:fixed;right:22px;bottom:22px;display:flex;flex-direction:column;gap:10px;z-index:80}
  .fab{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;
    box-shadow:0 6px 20px rgba(30,60,140,.28);transition:transform .15s ease,box-shadow .15s ease;position:relative}
  .fab:hover{transform:translateY(-2px) scale(1.05);box-shadow:0 10px 26px rgba(30,60,140,.35)}
  .fab svg{width:22px;height:22px;stroke:#fff;fill:none;stroke-width:1.8}
  .fab.qa-btn{background:linear-gradient(135deg,#4d8bff,#2f6fed)}
  .fab.help-btn{background:linear-gradient(135deg,#8a98ad,#5f6f88)}
  .fab .tip{position:absolute;right:56px;top:50%;transform:translateY(-50%);background:var(--navy);color:#fff;font-size:12px;
    padding:5px 10px;border-radius:7px;white-space:nowrap;opacity:0;pointer-events:none;transition:.15s}
  .fab:hover .tip{opacity:1}
  .qa{position:fixed;right:22px;bottom:82px;width:372px;max-width:calc(100vw - 28px);height:500px;max-height:calc(100vh - 120px);
    background:#fff;border-radius:16px;box-shadow:0 18px 50px rgba(15,25,50,.22);border:1px solid var(--border);
    display:none;flex-direction:column;overflow:hidden;z-index:85;animation:pop .18s ease}
  .qa.on{display:flex}
  .qa-h{background:linear-gradient(120deg,#2f6fed,#4d8bff);color:#fff;padding:13px 16px;display:flex;align-items:center;gap:9px;flex-shrink:0}
  .qa-h .qt{font-weight:700;font-size:14px}
  .qa-h .qp{font-size:11px;opacity:.85;margin-top:1px}
  .qa-h .sp{flex:1}
  .qa-h .x{cursor:pointer;font-size:15px;opacity:.85;padding:2px 4px}
  .qa-h .x:hover{opacity:1}
  .qa-b{flex:1;overflow-y:auto;padding:14px;background:#f7f9fd}
  .qa-m{display:flex;margin-bottom:12px}
  .qa-m.u{justify-content:flex-end}
  .qa-m .bb{max-width:82%;padding:9px 13px;border-radius:12px;line-height:1.7;font-size:13px;white-space:pre-wrap;word-break:break-word}
  .qa-m.a .bb{background:#fff;border:1px solid var(--border);border-top-left-radius:3px;box-shadow:0 1px 4px rgba(20,30,60,.05)}
  .qa-m.u .bb{background:var(--blue);color:#fff;border-top-right-radius:3px}
  .qa-m.a .bb .dots i{display:inline-block;width:5px;height:5px;border-radius:50%;background:#b8c4d8;margin-right:4px;animation:qd 1s infinite}
  .qa-m.a .bb .dots i:nth-child(2){animation-delay:.15s}.qa-m.a .bb .dots i:nth-child(3){animation-delay:.3s}
  @keyframes qd{0%,100%{opacity:.3;transform:translateY(0)}50%{opacity:1;transform:translateY(-2px)}}
  .qa-chips{display:flex;gap:6px;flex-wrap:wrap;padding:0 14px 8px;background:#f7f9fd;flex-shrink:0}
  .qa-chips .chip{font-size:12px;color:var(--blue);background:var(--blue-soft);border:1px solid #cdddfb;border-radius:20px;padding:4px 11px;cursor:pointer}
  .qa-chips .chip:hover{background:#dbe8fd}
  .qa-in{display:flex;gap:8px;padding:10px 12px;border-top:1px solid var(--border);background:#fff;flex-shrink:0}
  .qa-in input{flex:1;height:36px;border:1px solid var(--border);border-radius:10px;padding:0 12px;font-size:13px}
  .qa-in input:focus{border-color:var(--blue)}
  .qa-in button{width:60px;height:36px;border-radius:10px;background:var(--blue);color:#fff;font-size:13px;font-weight:600}
  .qa-in button:disabled{opacity:.5}
  .help-doc h3{font-size:15px;margin:16px 0 8px;display:flex;align-items:center;gap:7px}
  .help-doc h3:first-child{margin-top:0}

  .help-doc .hd-path{background:var(--blue-soft);border:1px solid #cdddfb;border-radius:9px;padding:10px 14px;line-height:1.9;color:var(--t1);margin:8px 0}
  .help-doc .hd-mod{border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px}
  .help-doc .hd-mod b{display:block;margin-bottom:4px}
  .help-doc .hd-mod span{color:var(--t2);line-height:1.75;font-size:12.5px}
  @media (max-width:600px){ .qa{right:14px} .fabs{right:14px;bottom:14px} }
</style>

<body>
<div class="app">
  <div class="rail" id="rail"></div>
  <div class="body">
    <div class="topbar">
      <span class="brand">鲜达 AI 订单助手</span>

      <div class="me"><span>系统管理员</span><span class="avatar"><svg viewBox="0 0 24 24"><circle cx="12" cy="8.2" r="3.4"/><path d="M5.5 19.5c.8-3.2 3.4-5 6.5-5s5.7 1.8 6.5 5"/></svg></span></div>
    </div>
    <div class="tabbar" id="tabbar"></div>
    <div class="view" id="view"></div>
  </div>
</div>
<div class="toast" id="toast"><span class="dot">✓</span><span id="toastMsg"></span></div>

<div class="mask" id="mask"><div class="modal" id="modal"></div></div>
<input type="file" id="fileInput" accept=".jpg,.jpeg,.png,.webp,.xlsx,.xls,.pdf" style="display:none">

<div class="qa" id="qaPanel">
  <div class="qa-h">
    <svg viewBox="0 0 24 24" style="width:20px;height:20px;stroke:#fff;fill:none;stroke-width:1.8"><rect x="4" y="8" width="16" height="12" rx="3"/><path d="M12 8V4M9 14h.01M15 14h.01"/></svg>
    <div><div class="qt">智能问答</div><div class="qp" id="qaPage">当前页面：首页</div></div>
    <div class="sp"></div><span class="x" onclick="toggleQA(false)">✕</span>
  </div>
  <div class="qa-b" id="qaMsgs"></div>
  <div class="qa-chips">
    <span class="chip" onclick="askQA('这个页面是做什么的？')">这个页面是做什么的？</span>
    <span class="chip" onclick="askQA('怎么完整走一遍从录入到下单的流程？')">怎么走完整流程？</span>

  </div>
  <div class="qa-in">
    <input id="qaInput" placeholder="问我任何关于这个产品的问题…" onkeydown="if(event.key==='Enter')sendQA()">
    <button id="qaSend" onclick="sendQA()">发送</button>
  </div>
</div>
<div class="fabs">
  <div class="fab qa-btn" onclick="toggleQA()"><span class="tip">智能问答：这个页面是干嘛的？</span>
    <svg viewBox="0 0 24 24"><rect x="4" y="8" width="16" height="12" rx="3"/><path d="M12 8V4M9 14h.01M15 14h.01"/></svg></div>
  <div class="fab help-btn" onclick="openHelp()"><span class="tip">帮助文档：功能用处与使用方法</span>
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M9.5 9.3a2.5 2.5 0 1 1 3.6 2.24c-.8.4-1.1.96-1.1 1.96"/><path d="M12 17h.01"/></svg></div>
</div>

<script>
const API = location.origin;
const S = {
  view:'home', customers:[], operators:[], custStats:{}, seg:'客户', custSearch:'', selCust:null, selGroup:null,
  chatMsgs:[], tasks:[], stats:{total:0,pending:0,done:0,failed:0,merged:0}, checked:new Set(),
  filters:{status:'',group:'',reviewer:'',customer:'',keyword:'',date_from:'',date_to:''},
  task:null, dtab:'基本信息',
  groups:[], groupStats:{}, salemenus:[], smStats:{}, prompts:[], promptTab:'客户提示词',
  memory:[], settings:null, setTab:'成员管理', custChecked:new Set(),
};
const STATUS_TXT={pending:'待处理',done:'已完成',failed:'失败',processing:'识别中',merged:'合单'};

/* ============ 基础 ============ */
async function api(path, opts){
  if(window.MOCK) return mockApi(path, opts||{});
  const o = Object.assign({}, opts);
  if(!(o.body instanceof FormData)) o.headers = Object.assign({'Content-Type':'application/json'}, o.headers);
  const r = await fetch(API+path, o);
  if(!r.ok){ let m=''; try{m=(await r.json()).detail}catch(e){}; throw new Error(m||('HTTP '+r.status)); }
  return r.json();
}
function loading(b){ document.getElementById('loading').classList.toggle('on',b); }
function toast(msg,err){ const t=document.getElementById('toast'); document.getElementById('toastMsg').textContent=msg;
  t.classList.toggle('err',!!err); t.classList.add('on'); clearTimeout(window._t); window._t=setTimeout(()=>t.classList.remove('on'),2400); }
function esc(s){ return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function notImpl(name){ toast('「'+(name||'该功能')+'」还在开发中 🛠️'); }
const num=x=>x===''||x==null?'':x;
function V(){ return document.getElementById('view'); }
function modal(title, body, foot){
  document.getElementById('modal').innerHTML =
    `<div class="m-head"><b>${title}</b><span class="x" onclick="closeModal()">✕</span></div>
     <div class="m-body">${body}</div>${foot?`<div class="m-foot">${foot}</div>`:''}`;
  document.getElementById('mask').classList.add('on');
}
function closeModal(){ document.getElementById('mask').classList.remove('on'); }
document.getElementById('mask').addEventListener('click',e=>{ if(e.target.id==='mask') closeModal(); });

/* ============ 智能问答 + 帮助文档（右下角常驻） ============ */
const PAGE_TIPS={
  home:'首页是产品总览工作台：8 大模块快捷入口、今日任务统计（点数字直达筛选列表）、录单额度、群聊看板。',
  luru:'订单录入页模拟客户下单：左侧选客户/群聊，右侧发一句话、一张菜单照片或一个 Excel，AI 自动识别成待审核订单。',
  shenhe:'订单审核页是人工审核工作台：多条件筛选、状态统计、勾选合单、重识别、分配审核员，点行进详情。',
  detail:'任务详情页：左侧还原原始消息，右侧可编辑商品/数量/单价/备注，确认下单后生成鲜达单号。',
  customers:'客户管理页维护客户档案：编号、绑定群聊、SKU 数，核心是设置备注优先级（单个/批量）。',
  groups:'群聊管理页管理微信/邮件群：禁言开关、群详情、新增邮件群。',
  salemenu:'报价单页是商品价格来源：启停、单个/批量同步、点名称预览 SKU。',
  prompts:'提示词页配置 AI 大脑：订单解析/意图识别模板，可新建/编辑/启停/删除。',
  memory:'AI 记忆页展示越用越准的机制：客户维度修正/习惯/常买统计，详情可见真实生效的修正规则。',
  settings:'设置页是系统配置中心：成员管理、信道/回复/通知开关，全部真实持久化。'};
S.qaHist=[]; S.qaOpened=false; S.qaBusy=false;
function qaPageSync(){
  const el=document.getElementById('qaPage');
  if(el) el.textContent='当前页面：'+(TAB_TXT[S.view]||'首页');
  if(S.qaOpened && document.getElementById('qaPanel').classList.contains('on') && S.qaLastView!==S.view){
    S.qaLastView=S.view;
    pushQA('a','已切换到「'+(TAB_TXT[S.view]||'首页')+'」。'+(PAGE_TIPS[S.view]||''));
  }
}
function pushQA(role,text,typing){
  const box=document.getElementById('qaMsgs');
  const bb=typing?'<span class="dots"><i></i><i></i><i></i></span>':esc(text);
  box.insertAdjacentHTML('beforeend',`<div class="qa-m ${role==='u'?'u':'a'}" ${typing?'id="qaTyping"':''}><div class="bb">${bb}</div></div>`);
  box.scrollTop=box.scrollHeight;
  if(!typing) S.qaHist.push({role:role==='u'?'user':'assistant',content:text});
}
function toggleQA(force){
  const p=document.getElementById('qaPanel');
  const on=force!==undefined?force:!p.classList.contains('on');
  p.classList.toggle('on',on);
  if(on){
    qaPageSync(); S.qaLastView=S.view;
    if(!S.qaOpened){ S.qaOpened=true;
      pushQA('a','你好！我是产品导览助手 🤖 可以问我任何页面是干嘛的、怎么用。\n\n'+(PAGE_TIPS[S.view]||PAGE_TIPS.home)); }
    setTimeout(()=>document.getElementById('qaInput').focus(),100);
  }
}
function askQA(q){ document.getElementById('qaInput').value=q; sendQA(); }
async function sendQA(){
  if(S.qaBusy) return;
  const ipt=document.getElementById('qaInput'); const q=ipt.value.trim();
  if(!q) return;
  ipt.value=''; pushQA('u',q);
  S.qaBusy=true; document.getElementById('qaSend').disabled=true;
  pushQA('a','',true);
  try{
    const d=await api('/api/assistant',{method:'POST',body:JSON.stringify({question:q,page:S.view,history:S.qaHist.slice(0,-1)})});
    document.getElementById('qaTyping')?.remove();
    pushQA('a',d.answer);
  }catch(e){
    document.getElementById('qaTyping')?.remove();
    pushQA('a','（网络异常）'+(PAGE_TIPS[S.view]||'')+'\n更多内容可点右下角「帮助文档」。');
  }
  S.qaBusy=false; document.getElementById('qaSend').disabled=false;
  ipt.focus();
}
const HELP_MODS=[
  ['🏠 首页','产品总览工作台。','看今日单量、剩余额度；点模块图标或群聊卡片快速跳转；点统计数字直达对应状态的审核列表。'],
  ['✍️ 订单录入','模拟客户在群里下单，是整个流程的起点。','左侧选客户或群聊 → 右侧输入框发一句话（如“牛肉20斤价格42元”）、点 📎 传菜单照片或 Excel → AI 识别后返回结果卡片，点卡片直接进任务详情。'],
  ['📋 订单审核','AI 识别结果的人工审核工作台。','用顶部条件筛选任务；勾选多个同群任务点「合单」；识别失败的点「重识别」；点任意行进入详情处理。'],
  ['📄 任务详情','单个任务的编辑与下单页。','左侧看客户原始消息；右侧直接改商品/数量/单价/备注（总价自动算）→「保存」存草稿，「确认下单」或「全部确认下单」生成鲜达单号。'],
  ['👥 客户管理','维护客户档案与识别偏好。','搜索/筛选客户；单个改「备注优先级」，或勾选多个批量设置——它决定 AI 把备注写到订单级还是商品级。'],
  ['💬 群聊管理','管理接单的微信/邮件群。','开关禁言（禁言后该群消息不再识别）；点名称看群详情；「新增邮件群」可添加邮件接单信道。'],
  ['🏷 报价单','商品与价格的数据源。','启停报价单；点「同步」把最新商品价格喂给 AI；点名称抽样预览里面的 SKU。'],
  ['🧩 提示词','AI 识别的大脑配置。','针对不同客户的订单格式，新建/编辑解析模板；意图识别模板负责判断消息是下单还是闲聊；可随时启停。'],
  ['🧠 AI 记忆','让 AI 越用越准。','看每个客户的修正/习惯/常买统计；点「详情」看真实生效的商品修正规则（如“九王→韭黄”）和近期任务。'],
  ['⚙️ 设置','系统配置中心。','成员管理（新增操作员/改密码/删除）；开关微信机器人/邮件信道；编辑下单成功后的自动回复模板。'],
];
function openHelp(){
  modal('📖 帮助文档 · 鲜达 AI 智能订单助手',
    `<div class="help-doc">
      <h3>这是什么产品？</h3>
      <p>一个生鲜 B2B 智能录单产品原型：客户在微信群发<b>一句话 / 一张图 / 一个 Excel</b>，AI 自动识别成结构化订单，人工审核后一键下单。所有功能真实可点、数据真实持久化。</p>
      <h3>🚀 60 秒上手路径</h3>
      <div class="hd-path">① 首页 → 点「订单录入」<br>② 左侧选「张三大排档」→ 输入：<b>牛肉20斤价格42元，啤酒5箱，记得牛肉切片</b> → 发送<br>③ AI 识别出订单 → 点结果卡片进详情 → 改改数量 → 点「全部确认下单」<br>④ 回「订单审核」列表，看到状态「已完成」+ 鲜达单号 ✅<br>⑤ 再试试：录入页点 📎 上传一张菜单照片，体验 GLM-4V 视觉识别</div>
      <h3>📚 各功能模块</h3>
      ${HELP_MODS.map(([t,w,h])=>`<div class="hd-mod"><b>${t}</b><span><b style="display:inline">用处：</b>${w}<br><b style="display:inline">怎么用：</b>${h}</span></div>`).join('')}
      <h3>❓ 常见问题</h3>
      <p><b>识别失败怎么办？</b>在订单审核列表对该任务点「重识别」，或进详情手动补充商品。</p>
      <p><b>为什么“九王”会自动变成“韭黄”？</b>这是 AI 记忆里的商品修正规则在生效（rules.json），可在「AI 记忆」页查看。</p>
      <p><b>数据存哪了？</b>${window.MOCK?'当前是静态演示模式，数据存在浏览器 localStorage，只影响你自己。想恢复初始演示数据，<a href="javascript:resetDemo()">点这里一键重置</a>。':'本地 SQLite（order_data.db），删掉该文件重启即恢复初始演示数据。'}</p>
      <p><b>还有不明白的？</b>点右下角蓝色「智能问答」按钮，直接问它任何问题。</p>
    </div>`,
    `<button class="btn pri" onclick="closeModal()">知道了</button>`);
}

/* ============ 导航 ============ */
const RAIL=[['home','首页','home'],['audit','订单审核','shenhe'],['edit','订单录入','luru'],
  ['users','客户','customers'],['chatg','群聊','groups'],['bag','报价单','salemenu'],
  ['code','提示词','prompts'],['brain','AI记忆','memory'],['gear','设置','settings']];
function renderRail(){
  document.getElementById('rail').innerHTML =
    '<div class="logo">AI</div>' + RAIL.map(([ic,label,v])=>{
      const on=(v===S.view)||(v==='shenhe'&&S.view==='detail');
      return `<div class="item ${on?'on':''}" onclick="go('${v}')">${svg(ic)}<span>${label}</span></div>`;
    }).join('');
}
const TAB_TXT={home:'首页',luru:'订单录入',shenhe:'订单审核',detail:'任务详情',customers:'客户管理',
  groups:'群聊管理',salemenu:'报价单',prompts:'提示词',memory:'AI 记忆',settings:'设置'};
function renderTabs(){
  let tabs=[[S.view,TAB_TXT[S.view]]];
  if(S.view==='detail') tabs=[['shenhe','订单审核'],['detail','任务详情']];
  document.getElementById('tabbar').innerHTML =
    `<div class="tab home-ic" onclick="go('home')">⌂</div>` +
    tabs.map(([v,t],i)=>`<div class="tab ${i===tabs.length-1?'on':''}" onclick="go('${v}')">${t}</div>`).join('');
}

async function go(v, arg){
  S.view=v; renderRail(); renderTabs(); qaPageSync();
  try{
    if(v==='home'){ await loadTasks(); await ensureGroups(); V().innerHTML=renderHome(); }
    else if(v==='luru'){ await ensureCustomers(); await ensureGroups(); V().innerHTML=renderLuru(); bindLuru(); }
    else if(v==='shenhe'){ S.checked.clear(); await loadTasks(); V().innerHTML=renderShenhe(); }
    else if(v==='detail'){ await openTask(arg); }
    else if(v==='customers'){ await loadCustPage(); V().innerHTML=renderCustomers(); }
    else if(v==='groups'){ await ensureGroups(true); V().innerHTML=renderGroups(); }
    else if(v==='salemenu'){ await loadSalemenus(); V().innerHTML=renderSalemenu(); }
    else if(v==='prompts'){ await loadPrompts(); V().innerHTML=renderPrompts(); }
    else if(v==='memory'){ await loadMemory(); V().innerHTML=renderMemory(); }
    else if(v==='settings'){ await loadSettings(); V().innerHTML=renderSettings(); }
  }catch(e){ toast(e.message,true); }
}

/* ============ 首页 ============ */
function renderHome(){
  const d=new Date(); const wk=['日','一','二','三','四','五','六'][d.getDay()];
  const date=`${d.getFullYear()}年${String(d.getMonth()+1).padStart(2,'0')}月${String(d.getDate()).padStart(2,'0')}日 星期${wk}`;
  const mods=[['audit','订单审核','#3d7cf0','shenhe'],['edit','订单录入','#22b07d','luru'],
    ['users','客户管理','#f0913d','customers'],['chatg','群聊管理','#e56ba8','groups'],
    ['bag','报价单','#a86ef0','salemenu'],['code','提示词','#5b8def','prompts'],
    ['brain','AI 记忆','#f05b8d','memory'],['gear','设置','#8a98ad','settings']];
  const today=new Date().toISOString().slice(0,10);
  const gb=S.groups.map(g=>{
    const gt=S.tasks.filter(t=>t.wx_group_name===g.name);
    const gtToday=gt.filter(t=>t.created_at.startsWith(today));
    const pending=gt.filter(t=>t.status==='pending').length;
    return `<div class="gcard" onclick="S.filters.group='${esc(g.name)}';go('shenhe')">
      <div class="gn"><span class="badge ${g.type==='微信'?'wx':'mail'}">${g.type}</span>${esc(g.name.split('/')[0])}</div>
      <div class="gm"><span>今日 <b>${gtToday.length}</b> 单</span><span>待处理 <b>${pending}</b></span><span>成员 <b>${g.members||'—'}</b></span></div>
    </div>`;
  }).join('');
  return `<div class="home">
    <div class="banner"><h1>早上好 👋，鲜达 AI 订单助手</h1><div class="date">${date}</div>
      <div class="mods">${mods.map(([ic,t,c,v])=>`<div class="mod" onclick="go('${v}')"><div class="ic" style="background:linear-gradient(135deg,${c},${c}cc)">${svg(ic)}</div><span>${t}</span></div>`).join('')}</div>
    </div>
    <div class="row2">
      <div class="panel"><div class="ph">🕓 今日任务</div>
        <div class="stats">
          <div class="s p" onclick="quickStatus('pending')"><b>${S.stats.pending}</b><span>待处理 ›</span></div>
          <div class="s d" onclick="quickStatus('done')"><b>${S.stats.done}</b><span>已完成</span></div>
          <div class="s f" onclick="quickStatus('failed')"><b>${S.stats.failed}</b><span>失败</span></div>
          <div class="s a" onclick="quickStatus('')"><b>${S.stats.total}</b><span>全部</span></div>
        </div>
      </div>
      <div class="panel quota"><div class="ph">⚡ 录单额度</div>
        <div class="big">99330</div><div style="color:var(--t3);font-size:12px">剩余额度</div>
        <div class="bar"><i></i></div>
        <div class="qf"><span>已用 1840</span><span>总额 101170</span></div>
      </div>
    </div>
    <div class="panel" style="margin-top:16px"><div class="ph">💬 群聊看板<div class="sp"></div><a onclick="go('groups')">全部 ›</a></div>
      <div class="gboard">${gb||'<div class="empty">暂无群聊</div>'}</div>
    </div>
  </div>`;
}

/* ============ 订单录入 ============ */
async function ensureCustomers(){
  if(S.customers.length) return;
  const d=await api('/api/customers'); S.customers=d.customers; S.operators=d.operators; S.custStats=d.stats;
}
async function ensureGroups(force){
  if(S.groups.length && !force) return;
  const d=await api('/api/groups'); S.groups=d.groups; S.groupStats=d.stats;
}
function renderLuru(){
  const isCust=S.seg==='客户';
  let listHtml='';
  if(isCust){
    const list=S.customers.filter(c=>!S.custSearch||c.name.includes(S.custSearch)||c.customer_id.includes(S.custSearch));
    listHtml=list.map(c=>`<div class="citem ${S.selCust&&S.selCust.customer_id===c.customer_id?'on':''}" onclick="selCust('${c.customer_id}')">
      <div class="cn">${esc(c.name)}</div><div class="cid">${c.customer_id}${c.wx_group_name?' · '+esc(c.wx_group_name):''}</div></div>`).join('');
  }else{
    const list=S.groups.filter(g=>!S.custSearch||g.name.includes(S.custSearch));
    listHtml=list.map(g=>`<div class="citem ${S.selGroup&&S.selGroup.id===g.id?'on':''}" onclick="selGroup(${g.id})">
      <div class="cn">${esc(g.name.split('/')[0])}</div><div class="cid"><span class="badge ${g.type==='微信'?'wx':'mail'}">${g.type}</span> ${g.customer_count} 个客户</div></div>`).join('');
  }
  const selName=S.selCust?S.selCust.name:(S.selGroup?S.selGroup.name.split('/')[0]:'');
  return `<div class="luru">
    <div class="cust">
      <div class="ch"><div class="tt">AI录单 <span class="ai">AI</span></div>
        <div class="segs">${['客户','群聊'].map(s=>`<button class="${S.seg===s?'on':''}" onclick="setSeg('${s}')">${s}</button>`).join('')}</div>
      </div>
      <div class="search">${svg('search')}<input placeholder="搜索名称、ID…" value="${esc(S.custSearch)}" oninput="S.custSearch=this.value;rerenderLuru(true)"></div>
      <div class="clist">${listHtml||'<div class="empty">无匹配结果</div>'}</div>
    </div>
    <div class="chat">
      <div class="msgs" id="msgs">${S.chatMsgs.length?S.chatMsgs.map(renderMsg).join(''):renderHeroEmpty()}</div>
      <div class="composer"><div class="box">
        <textarea id="luruInput" placeholder="${selName?('已选择：'+esc(selName)+'，粘贴或输入下单内容…'):'请先在左侧选择客户或群聊…'}"></textarea>
        <div class="cf"><button class="up" title="上传图片 / Excel" onclick="pickFile()">${svg('up')}</button>
          <button class="btn pri" onclick="sendLuru()">发送</button></div>
      </div><div class="tip">支持文字、图片（GLM-4V 识别）、Excel；PDF 识别开发中</div></div>
    </div>
  </div>`;
}
function renderHeroEmpty(){
  return `<div class="hero"><div class="ic">${svg('stack')}</div><h2>让录单 更简单</h2>
    <p>选择客户，发送文字 / 图片 / Excel<br>AI 自动识别商品信息并生成订单</p></div>`;
}
function renderMsg(m){
  if(m.role==='me') return `<div class="msg me"><div class="ava">${svg('user')}</div><div class="bub">${esc(m.text)}</div></div>`;
  return `<div class="msg ai"><div class="ava">${svg('robot')}</div><div class="bub">${m.html}</div></div>`;
}
function bindLuru(){
  const t=document.getElementById('luruInput');
  if(t) t.addEventListener('keydown',e=>{ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendLuru();} });
  scrollMsgs();
}
function setSeg(s){ S.seg=s; S.custSearch=''; rerenderLuru(); }
function selCust(id){ S.selCust=S.customers.find(c=>c.customer_id===id); S.selGroup=null; rerenderLuru(); }
function selGroup(id){
  S.selGroup=S.groups.find(g=>g.id===id);
  const bound=S.customers.find(c=>c.wx_group_name && S.selGroup.name.includes(c.wx_group_name));
  S.selCust=bound||null;
  rerenderLuru();
  if(!bound) toast('该群聊暂无绑定客户，将以群名录单');
}
function rerenderLuru(keepFocus){
  const el=document.activeElement; const pos=el&&el.selectionStart;
  V().innerHTML=renderLuru(); bindLuru();
  if(keepFocus){ const s=document.querySelector('.search input'); if(s){ s.focus(); s.setSelectionRange(pos,pos); } }
}
function currentTarget(){
  if(S.selCust) return {customer_id:S.selCust.customer_id, customer_name:S.selCust.name, wx_group_name:S.selCust.wx_group_name||(S.selGroup?S.selGroup.name:'')};
  if(S.selGroup) return {customer_id:'', customer_name:S.selGroup.name.split('/')[0], wx_group_name:S.selGroup.name};
  return null;
}
async function sendLuru(){
  const t=document.getElementById('luruInput'); const text=t.value.trim();
  if(!text) return;
  S.chatMsgs.push({role:'me',text}); t.value='';
  document.getElementById('msgs').innerHTML=S.chatMsgs.map(renderMsg).join(''); scrollMsgs();
  const target=currentTarget();
  if(!target){
    S.chatMsgs.push({role:'ai',html:'请先在左侧选择一个客户（或群聊），我才能帮你把这段内容识别成对应客户的订单哦～'});
    document.getElementById('msgs').innerHTML=S.chatMsgs.map(renderMsg).join(''); scrollMsgs(); return;
  }
  const idx=S.chatMsgs.push({role:'ai',html:'<span style="color:var(--t3)">AI 正在识别商品信息…</span>'})-1;
  document.getElementById('msgs').innerHTML=S.chatMsgs.map(renderMsg).join(''); scrollMsgs();
  try{
    const d=await api('/api/tasks',{method:'POST',body:JSON.stringify(Object.assign({text},target))});
    fillLuruResult(idx,d);
  }catch(e){ S.chatMsgs[idx].html='识别失败：'+esc(e.message); document.getElementById('msgs').innerHTML=S.chatMsgs.map(renderMsg).join(''); }
}
function fillLuruResult(idx,d){
  const tk=d.task;
  if(d.success){
    S.chatMsgs[idx].html=`订单构建成功，已生成待审核任务。<br>共识别 <b>${tk.product_count}</b> 项商品，客户「${esc(tk.customer_name)}」。
      <div class="resultcard"><div class="rt">${esc(tk.customer_name)}</div>
      <div class="rmeta">任务号 ${tk.id} · <span class="badge pending">待处理</span> · ${tk.product_count} 条明细${tk.original_file?' · 📎'+esc(tk.original_file):''}</div>
      <button class="btn pri" onclick="go('detail','${tk.id}')">去审核 →</button></div>`;
  }else{
    S.chatMsgs[idx].html='没能识别出有效商品，请换种表述或换个文件再试。任务已记入「失败」列表。';
  }
  document.getElementById('msgs').innerHTML=S.chatMsgs.map(renderMsg).join(''); scrollMsgs();
}
function pickFile(){
  if(!currentTarget()){ toast('请先在左侧选择客户或群聊',true); return; }
  document.getElementById('fileInput').click();
}
document.getElementById('fileInput').addEventListener('change', async e=>{
  const f=e.target.files[0]; e.target.value='';
  if(!f) return;
  if(/\.pdf$/i.test(f.name)){ notImpl('PDF 识别'); return; }
  const target=currentTarget();
  S.chatMsgs.push({role:'me',text:'📎 '+f.name});
  const idx=S.chatMsgs.push({role:'ai',html:'<span style="color:var(--t3)">AI 正在识别文件（'+esc(f.name)+'）…</span>'})-1;
  if(S.view==='luru'){ document.getElementById('msgs').innerHTML=S.chatMsgs.map(renderMsg).join(''); scrollMsgs(); }
  try{
    const fd=new FormData();
    fd.append('file',f); fd.append('customer_id',target.customer_id);
    fd.append('customer_name',target.customer_name); fd.append('wx_group_name',target.wx_group_name);
    const d=await api('/api/tasks/upload',{method:'POST',body:fd});
    fillLuruResult(idx,d);
  }catch(err){ S.chatMsgs[idx].html='文件识别失败：'+esc(err.message);
    if(S.view==='luru') document.getElementById('msgs').innerHTML=S.chatMsgs.map(renderMsg).join(''); }
});
function scrollMsgs(){ const m=document.getElementById('msgs'); if(m)m.scrollTop=m.scrollHeight; }

/* ============ 订单审核 ============ */
async function loadTasks(){
  const f=S.filters; const qs=new URLSearchParams(Object.entries(f).filter(([k,v])=>v)).toString();
  const d=await api('/api/tasks'+(qs?'?'+qs:'')); S.tasks=d.tasks; S.stats=d.stats;
}
function renderShenhe(){
  const f=S.filters;
  const opt=(arr,val)=>arr.map(o=>`<option value="${o[0]}" ${o[0]===val?'selected':''}>${o[1]}</option>`).join('');
  const statusOpts=[['','全部'],['pending','待处理'],['done','已完成'],['failed','失败'],['merged','合单']];
  const revOpts=[['','全部']].concat((S.operators.length?S.operators:['未分配']).map(o=>[o,o]));
  const rows=S.tasks.map(renderRow).join('');
  const mergeOn=S.checked.size>=2;
  return `<div class="wrap">
    <div class="filters">
      <div class="fld"><label>状态</label><select onchange="setF('status',this.value)">${opt(statusOpts,f.status)}</select></div>
      <div class="fld"><label>下单日期</label><div class="daterange"><input type="date" class="ipt" value="${f.date_from}" onchange="setF('date_from',this.value)"><span>→</span><input type="date" class="ipt" value="${f.date_to}" onchange="setF('date_to',this.value)"></div></div>
      <div class="fld"><label>群聊</label><input class="ipt" placeholder="全部" value="${esc(f.group)}" onchange="setF('group',this.value)"></div>
      <div class="fld"><label>审核员</label><select onchange="setF('reviewer',this.value)">${opt(revOpts,f.reviewer)}</select></div>
      <div class="fld"><label>门店</label><input class="ipt" placeholder="全部" value="${esc(f.customer)}" onchange="setF('customer',this.value)"></div>
      <div class="fld" style="grid-column:span 2"><label>订单号/原文</label><input class="ipt" placeholder="搜索关键词" value="${esc(f.keyword)}" onchange="setF('keyword',this.value)"></div>
      <div class="fld acts"><button class="btn pri" onclick="doQuery()">查 询</button><button class="btn ghost" onclick="resetF()">重 置</button></div>
    </div>
    <div class="listcard">
      <div class="lc-head"><b>待审核订单</b><div class="sp"></div>
        <button class="btn ghost" onclick="doQuery()">刷 新</button>
        <button class="btn ${mergeOn?'pri':'ghost'}" ${mergeOn?'':'disabled style="opacity:.5;cursor:not-allowed"'} onclick="${mergeOn?'doMerge()':''}">合 单${S.checked.size?`（${S.checked.size}）`:''}</button>
      </div>
      ${S.stats.failed?`<div class="alert">⚠️ 有 ${S.stats.failed} 个识别失败的订单，<a onclick="quickStatus('failed')">立即查看</a></div>`:''}
      <div class="stabs">
        <div class="stab ${!f.status?'on':''}" onclick="quickStatus('')">全部 <b>${S.stats.total}</b></div>
        <div class="stab ${f.status==='pending'?'on':''}" onclick="quickStatus('pending')">待处理 <b>${S.stats.pending}</b></div>
        <div class="stab ${f.status==='done'?'on':''}" onclick="quickStatus('done')">已完成 <b>${S.stats.done}</b></div>
        <div class="stab ${f.status==='merged'?'on':''}" onclick="quickStatus('merged')">合单 <b>${S.stats.merged||0}</b></div>
      </div>
      <div style="overflow-x:auto"><table>
        <thead><tr><th style="width:36px"><input type="checkbox" onchange="checkAll(this.checked)"></th>
          <th>状态</th><th>时间</th><th>群聊</th><th>门店</th><th>原文</th><th>商品数</th><th>鲜达单号</th><th>审核员</th><th>操作</th></tr></thead>
        <tbody>${rows||'<tr><td colspan="10" class="empty">暂无数据</td></tr>'}</tbody>
      </table></div>
      <div class="pagefoot"><span>共 ${S.tasks.length} 条记录</span><div class="pg"><span>1</span> 20 条/页</div></div>
    </div>
  </div>`;
}
function renderRow(t){
  const st=t.status; const revs=S.operators.length?S.operators:['未分配'];
  const canCheck=st==='pending'||st==='failed';
  const sel=`<select class="rev-sel" onchange="setReviewer('${t.id}',this.value)" onclick="event.stopPropagation()">${revs.map(o=>`<option ${o===t.operator?'selected':''}>${o}</option>`).join('')}</select>`;
  return `<tr>
    <td>${canCheck?`<input type="checkbox" ${S.checked.has(t.id)?'checked':''} onchange="checkOne('${t.id}',this.checked)">`:''}</td>
    <td><span class="badge ${st}">${STATUS_TXT[st]||st}</span></td>
    <td>${t.created_at.slice(5,16)}</td>
    <td class="ellipsis" style="max-width:130px">${esc(t.wx_group_name)||'-'}</td>
    <td class="ellipsis" style="max-width:150px">${esc(t.customer_name)||'-'}</td>
    <td class="txt-ell" title="${esc(t.original_message)}">${esc(t.original_message.replace(/\n/g,' '))||'-'}</td>
    <td>${t.product_count}</td>
    <td>${esc(t.xd_order_no)||'-'}</td>
    <td>${sel}</td>
    <td class="op-links"><a onclick="go('detail','${t.id}')">查看</a><a onclick="reidentify('${t.id}')">重识别</a><a class="del" onclick="delTask('${t.id}')">删除</a></td>
  </tr>`;
}
function checkOne(id,on){ on?S.checked.add(id):S.checked.delete(id); V().innerHTML=renderShenhe(); }
function checkAll(on){ S.checked.clear(); if(on) S.tasks.filter(t=>t.status==='pending'||t.status==='failed').forEach(t=>S.checked.add(t.id)); V().innerHTML=renderShenhe(); }
async function doMerge(){
  if(!confirm(`确认将选中的 ${S.checked.size} 个任务合并为一单？`)) return;
  loading(true);
  try{ const d=await api('/api/tasks/merge',{method:'POST',body:JSON.stringify({task_ids:[...S.checked]})});
    toast('合单成功'); S.checked.clear(); go('detail', d.task.id); }
  catch(e){ toast(e.message,true); }
  loading(false);
}
function setF(k,v){ S.filters[k]=v; }
function doQuery(){ go('shenhe'); }
function resetF(){ S.filters={status:'',group:'',reviewer:'',customer:'',keyword:'',date_from:'',date_to:''}; go('shenhe'); }
function quickStatus(s){ S.filters.status=s; go('shenhe'); }
async function setReviewer(id,val){ try{ const t=await api('/api/tasks/'+id); await api('/api/tasks/'+id,{method:'PUT',body:JSON.stringify({groups:t.groups,operator:val})}); toast('已分配审核员：'+val);}catch(e){toast(e.message,true);} }
async function reidentify(id){ loading(true); try{ const d=await api('/api/tasks/'+id+'/reidentify',{method:'POST',body:'{}'}); toast(d.success?'重识别完成':'重识别未得到有效商品',!d.success); await loadTasks(); V().innerHTML=renderShenhe(); }catch(e){toast(e.message,true);} loading(false); }
async function delTask(id){ if(!confirm('确认删除该任务？'))return; try{ await api('/api/tasks/'+id,{method:'DELETE'}); toast('已删除'); await loadTasks(); V().innerHTML=renderShenhe(); }catch(e){toast(e.message,true);} }

/* ============ 任务详情 ============ */
async function openTask(id){
  loading(true);
  try{ S.task=await api('/api/tasks/'+id); S.dtab='基本信息'; V().innerHTML=renderDetail(); }
  catch(e){ toast(e.message,true); }
  loading(false);
}
function renderDetail(){
  const t=S.task; const submitted=t.groups.filter(g=>g.status==='已提交').length;
  return `<div class="detail">
    <div class="dleft">
      <div class="dtabs">${['基本信息','群聊消息','定位来源'].map(x=>`<span class="${S.dtab===x?'on':''}" onclick="setDtab('${x}')">${x}</span>`).join('')}</div>
      <div id="dleftBody">${renderDleft()}</div>
    </div>
    <div class="dmain">
      <div class="dm-head"><b>任务详情</b><span class="badge ${t.status}">${STATUS_TXT[t.status]}</span>
        <span style="color:var(--t3);font-size:12px">${submitted}/${t.groups.length} 组已提交</span>
        <div class="sp"></div>
        <button class="btn ghost" onclick="addGroup()">新建分组</button>
        <button class="btn ghost" onclick="saveTask()">保 存</button>
        <button class="btn danger" onclick="delFromDetail()">删 除</button>
        <button class="btn pri" onclick="confirmAll()">全部确认下单</button>
      </div>
      <div class="dm-meta"><span>客服群聊：<b>${esc(t.wx_group_name)||'-'}</b></span><span>门店：<b>${esc(t.customer_name)}</b></span><span>创建时间：<b>${t.created_at}</b></span><span>鲜达单号：<b>${esc(t.xd_order_no)||'-'}</b></span></div>
      ${t.groups.map((g,gi)=>renderGroup(g,gi)).join('')||'<div class="empty">暂无订单分组（识别失败任务可点「新建分组」手工录入，或回列表「重识别」）</div>'}
      <div class="addgroup" onclick="addGroup()">＋ 新增订单分组</div>
    </div>
  </div>`;
}
function renderDleft(){
  const t=S.task;
  if(S.dtab==='群聊消息'){
    const msgs=(t.original_message||'').split(/\n---\n|\n(?=【)/).filter(Boolean);
    return msgs.map(m=>`<div class="wxmsg"><div class="wava">${esc(t.customer_name[0]||'客')}</div>
      <div><div class="wname">${esc(t.wx_group_name||'群聊')} · 下单人员</div><div class="wb">${esc(m)}</div></div></div>`).join('')
      ||'<div class="empty">暂无群聊消息</div>';
  }
  return `${t.original_file?`<div class="sec-t">原始文件</div><div class="file"><div class="fi">${svg('file')}</div><div class="fn">${esc(t.original_file)}</div><a onclick="notImpl('文件下载')">下载</a></div>`:''}
    <div class="sec-t">原始消息</div>
    <div class="rawmsg" id="rawmsg">${esc(t.original_message)||'（无）'}</div>`;
}
function setDtab(x){
  if(x==='定位来源'){
    S.dtab='基本信息';
    document.getElementById('dleftBody').innerHTML=renderDleft();
    document.querySelectorAll('.dtabs span').forEach((s,i)=>s.classList.toggle('on',i===0));
    const r=document.getElementById('rawmsg');
    if(r){ r.classList.add('flash'); r.scrollIntoView({behavior:'smooth',block:'center'}); setTimeout(()=>r.classList.remove('flash'),1600); }
    toast('已定位到原始消息来源');
    return;
  }
  S.dtab=x;
  document.getElementById('dleftBody').innerHTML=renderDleft();
  document.querySelectorAll('.dtabs span').forEach(s=>s.classList.toggle('on',s.textContent===x));
}
function renderGroup(g,gi){
  const rows=g.items.map((it,ii)=>`
    <tr class="${it.warning?'warn':''}">
      <td>${it.seq||ii+1}</td>
      <td style="color:var(--t2)">${esc(it.raw_text)}</td>
      <td><input class="ci" value="${esc(it.product_name)}" oninput="edit(${gi},${ii},'product_name',this.value)">${it.warning?'<span class="warntip">⚠ 未匹配</span>':''}</td>
      <td><input class="ci qn" value="${num(it.qty)}" oninput="edit(${gi},${ii},'qty',this.value)"></td>
      <td><input class="ci un" value="${esc(it.unit)}" oninput="edit(${gi},${ii},'unit',this.value)"></td>
      <td><input class="ci pn" value="${num(it.price)}" oninput="edit(${gi},${ii},'price',this.value)"></td>
      <td style="color:var(--t2)">¥${num(it.total)||'0.00'}</td>
      <td><input class="ci" value="${esc(it.remark)}" placeholder="备注" oninput="edit(${gi},${ii},'remark',this.value)"></td>
      <td><div class="rowop"><button class="add" onclick="addRow(${gi},${ii})">＋</button><button class="del" onclick="delRow(${gi},${ii})">−</button></div></td>
    </tr>`).join('');
  return `<div class="group">
    <div class="g-head"><span class="gt">订单${gi+1}组</span><span class="cnt">${g.items.length}个商品</span>
      ${g.status==='已提交'?'<span class="badge done">已提交</span>':'<span class="badge pending">待确定</span>'}
      <div class="sp"></div><button class="btn pri" onclick="confirmGroup(${gi})">确认下单</button></div>
    <div class="g-form">
      <div class="gf"><label>下单门店</label><input class="ipt" value="${esc(g.store_name)}" oninput="editG(${gi},'store_name',this.value)"></div>
      <div class="gf"><label>收货时间</label><input type="date" class="ipt" value="${g.deliver_date}" onchange="editG(${gi},'deliver_date',this.value)">
        <input class="ipt" style="width:64px" value="${g.time_start}" oninput="editG(${gi},'time_start',this.value)"><span>→</span><input class="ipt" style="width:64px" value="${g.time_end}" oninput="editG(${gi},'time_end',this.value)"></div>
      <span class="gm-rec">GM推荐 06:00~20:30</span>
      <div class="gf" style="flex:1;min-width:260px"><label>订单备注</label><input class="ipt" style="flex:1" value="${esc(g.remark)}" placeholder="点击填写备注" oninput="editG(${gi},'remark',this.value)"></div>
    </div>
    <div class="itbl"><div style="overflow-x:auto"><table>
      <thead><tr><th style="width:40px">序号</th><th>识别文本</th><th>商品名称</th><th>数量</th><th>单位</th><th>单价</th><th>总价</th><th>备注</th><th style="width:60px">操作</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div><div class="addprod" onclick="addRow(${gi},${g.items.length-1})">＋ 新增商品</div></div>
  </div>`;
}
function edit(gi,ii,k,v){ const it=S.task.groups[gi].items[ii];
  if(k==='qty'||k==='price'){ v=v.replace(/[^0-9.]/g,''); it[k]=v===''?'':parseFloat(v); const q=parseFloat(it.qty),p=parseFloat(it.price); it.total=(!isNaN(q)&&!isNaN(p))?Math.round(q*p*100)/100:''; refreshTotals(gi); }
  else it[k]=v;
  if(k==='product_name') it.warning=!v;
}
function refreshTotals(gi){
  const g=S.task.groups[gi];
  const trs=document.querySelectorAll('.group')[gi].querySelectorAll('tbody tr');
  g.items.forEach((it,ii)=>{ const td=trs[ii]&&trs[ii].children[6]; if(td) td.textContent='¥'+(num(it.total)||'0.00'); });
}
function editG(gi,k,v){ S.task.groups[gi][k]=v; }
function addRow(gi,ii){ const g=S.task.groups[gi]; g.items.splice(ii+1,0,{seq:g.items.length+1,raw_text:'',product_name:'',qty:'',unit:'斤',price:'',total:'',remark:'',sku:'',warning:true}); reseq(gi); V().innerHTML=renderDetail(); }
function delRow(gi,ii){ const g=S.task.groups[gi]; if(g.items.length>1){g.items.splice(ii,1); reseq(gi);} V().innerHTML=renderDetail(); }
function reseq(gi){ S.task.groups[gi].items.forEach((it,i)=>it.seq=i+1); }
function addGroup(){ const t=S.task; const d=new Date(Date.now()+864e5).toISOString().slice(0,10);
  t.groups.push({store_name:t.customer_name,store_id:t.customer_id,deliver_date:d,time_start:'06:00',time_end:'22:30',remark:'',tag:'',status:'待确定',items:[{seq:1,raw_text:'',product_name:'',qty:'',unit:'斤',price:'',total:'',remark:'',sku:'',warning:true}]});
  V().innerHTML=renderDetail(); }
async function saveTask(){ try{ S.task=await api('/api/tasks/'+S.task.id,{method:'PUT',body:JSON.stringify({groups:S.task.groups})}); toast('已保存'); V().innerHTML=renderDetail(); }catch(e){toast(e.message,true);} }
async function saveSilently(){ try{ S.task=await api('/api/tasks/'+S.task.id,{method:'PUT',body:JSON.stringify({groups:S.task.groups})}); }catch(e){} }
async function confirmGroup(gi){ await saveSilently(); try{ const d=await api('/api/tasks/'+S.task.id+'/confirm',{method:'POST',body:JSON.stringify({group_index:gi})}); S.task=d.task; toast(d.all_done?('全部下单完成，鲜达单号 '+S.task.xd_order_no):'该分组已确认下单'); V().innerHTML=renderDetail(); }catch(e){toast(e.message,true);} }
async function confirmAll(){ await saveSilently(); try{ const d=await api('/api/tasks/'+S.task.id+'/confirm',{method:'POST',body:'{}'}); S.task=d.task; toast('全部确认下单完成，鲜达单号 '+S.task.xd_order_no); V().innerHTML=renderDetail(); }catch(e){toast(e.message,true);} }
async function delFromDetail(){ if(!confirm('确认删除该任务？'))return; try{ await api('/api/tasks/'+S.task.id,{method:'DELETE'}); toast('已删除'); go('shenhe'); }catch(e){toast(e.message,true);} }

/* ============ 客户管理 ============ */
let custFilter={keyword:'',bind:'',priority:''};
async function loadCustPage(){
  const qs=new URLSearchParams(Object.entries(custFilter).filter(([k,v])=>v)).toString();
  const d=await api('/api/customers'+(qs?'?'+qs:''));
  S.customers=d.customers; S.operators=d.operators; S.custStats=d.stats; S.custChecked.clear();
}
function renderCustomers(){
  const rows=S.customers.map(c=>`<tr>
    <td><input type="checkbox" ${S.custChecked.has(c.customer_id)?'checked':''} onchange="custCheck('${c.customer_id}',this.checked)"></td>
    <td>${c.customer_id}</td>
    <td style="font-weight:500">${esc(c.name)}</td>
    <td class="ellipsis" style="max-width:190px;color:var(--t2)">${esc(c.address)||'-'}</td>
    <td>${esc(c.phone)||'-'}</td>
    <td>${c.wx_group_name?`<span class="badge processing">${esc(c.wx_group_name)}</span>`:'<span class="badge gray">未绑定</span>'}</td>
    <td>${c.sku_count}</td>
    <td><div class="prio">${['订单备注','SPU备注','合并'].map(p=>`<span class="${c.priority===p?'on':''}" onclick="setPrio('${c.customer_id}','${p}')">${p}</span>`).join('')}</div></td>
  </tr>`).join('');
  return `<div class="wrap">
    <div class="filters" style="grid-template-columns:repeat(3,1fr) auto">
      <div class="fld"><label>客户名称</label><input class="ipt" placeholder="名称 / ID" value="${esc(custFilter.keyword)}" onchange="custFilter.keyword=this.value"></div>
      <div class="fld"><label>绑定状态</label><select onchange="custFilter.bind=this.value">
        <option value="">全部</option><option value="bound" ${custFilter.bind==='bound'?'selected':''}>已绑定群</option><option value="unbound" ${custFilter.bind==='unbound'?'selected':''}>未绑定群</option></select></div>
      <div class="fld"><label>备注优先级</label><select onchange="custFilter.priority=this.value">
        <option value="">全部</option>${['订单备注','SPU备注','合并'].map(p=>`<option ${custFilter.priority===p?'selected':''}>${p}</option>`).join('')}</select></div>
      <div class="fld acts"><button class="btn pri" onclick="go('customers')">查 询</button><button class="btn ghost" onclick="custFilter={keyword:'',bind:'',priority:''};go('customers')">重 置</button></div>
    </div>
    <div class="listcard">
      <div class="lc-head">
        <div class="statbar">总客户 <b>${S.custStats.total}</b><span class="sep">|</span>已绑群 <b>${S.custStats.bound}</b><span class="sep">|</span>已同步 SKU <b>${S.custStats.synced}</b></div>
        <div class="sp"></div>
        <button class="btn ghost" onclick="batchPrio()">批量设置备注优先级${S.custChecked.size?`（${S.custChecked.size}）`:''}</button>
        <button class="btn ghost" onclick="go('customers')">刷 新</button>
      </div>
      <div style="overflow-x:auto"><table>
        <thead><tr><th style="width:36px"><input type="checkbox" onchange="custCheckAll(this.checked)"></th>
          <th>客户 ID</th><th>客户名称</th><th>地址</th><th>电话</th><th>群绑定</th><th>已同步的SKU数</th><th>备注优先级</th></tr></thead>
        <tbody>${rows||'<tr><td colspan="8" class="empty">暂无客户</td></tr>'}</tbody>
      </table></div>
      <div class="pagefoot"><span>共 ${S.customers.length} 个客户</span><div class="pg"><span>1</span> 50 条/页</div></div>
    </div>
  </div>`;
}
function custCheck(id,on){ on?S.custChecked.add(id):S.custChecked.delete(id); V().innerHTML=renderCustomers(); }
function custCheckAll(on){ S.custChecked.clear(); if(on) S.customers.forEach(c=>S.custChecked.add(c.customer_id)); V().innerHTML=renderCustomers(); }
async function setPrio(cid,p){
  try{ await api('/api/customers/priority',{method:'PUT',body:JSON.stringify({customer_ids:[cid],priority:p})});
    const c=S.customers.find(x=>x.customer_id===cid); c.priority=p; V().innerHTML=renderCustomers(); toast('已设置为「'+p+'」'); }
  catch(e){ toast(e.message,true); }
}
function batchPrio(){
  if(!S.custChecked.size){ toast('请先勾选客户',true); return; }
  modal('批量设置备注优先级',
    `<div class="frow"><label>优先级</label><select class="ipt" id="mPrio">${['订单备注','SPU备注','合并'].map(p=>`<option>${p}</option>`).join('')}</select></div>
     <div style="color:var(--t3)">将应用到选中的 ${S.custChecked.size} 个客户</div>`,
    `<button class="btn ghost" onclick="closeModal()">取消</button><button class="btn pri" onclick="doBatchPrio()">确定</button>`);
}
async function doBatchPrio(){
  const p=document.getElementById('mPrio').value;
  try{ await api('/api/customers/priority',{method:'PUT',body:JSON.stringify({customer_ids:[...S.custChecked],priority:p})});
    closeModal(); toast('已批量设置'); go('customers'); }catch(e){ toast(e.message,true); }
}

/* ============ 群聊管理 ============ */
let grpFilter={type:'',reviewer:''};
function renderGroups(){
  const list=S.groups.filter(g=>(!grpFilter.type||g.type===grpFilter.type)&&(!grpFilter.reviewer||g.reviewer.includes(grpFilter.reviewer)));
  const rows=list.map(g=>`<tr>
    <td style="font-weight:500">${esc(g.name)}</td>
    <td><span class="badge ${g.type==='微信'?'wx':'mail'}">${g.type}</span></td>
    <td>${g.members||'—'}</td>
    <td><a onclick="groupDetail(${g.id})">${g.customer_count} 个客户</a></td>
    <td>${esc(g.reviewer)}</td>
    <td><span class="sw ${g.muted?'':'on'}" title="${g.muted?'已禁言':'正常'}" onclick="toggleMute(${g.id})"></span> <span style="color:${g.muted?'var(--red)':'var(--t3)'};font-size:12px">${g.muted?'禁言':'正常'}</span></td>
    <td>—</td><td>—</td>
    <td class="op-links"><a onclick="groupDetail(${g.id})">详情</a>${g.type==='邮件'?`<a onclick="notImpl('编辑邮件群')">编辑</a>`:''}<a class="del" onclick="delGroup(${g.id})">删除</a></td>
  </tr>`).join('');
  return `<div class="wrap">
    <div class="filters" style="grid-template-columns:1fr 1fr auto">
      <div class="fld"><label>群聊类型</label><select onchange="grpFilter.type=this.value;go('groups')">
        <option value="">全部</option><option ${grpFilter.type==='微信'?'selected':''}>微信</option><option ${grpFilter.type==='邮件'?'selected':''}>邮件</option></select></div>
      <div class="fld"><label>审核员</label><input class="ipt" placeholder="全部" value="${esc(grpFilter.reviewer)}" onchange="grpFilter.reviewer=this.value;go('groups')"></div>
      <div class="fld acts">
        <button class="btn ghost" onclick="notImpl('批量删除')">批量删除</button>
        <button class="btn ghost" onclick="notImpl('群聊迁移')">群聊迁移</button>
        <button class="btn pri" onclick="addEmailGroup()">新增邮件群</button>
      </div>
    </div>
    <div class="listcard">
      <div class="lc-head">
        <div class="statbar">总群聊 <b>${S.groupStats.total}</b><span class="sep">|</span>已绑客户 <b>${S.groupStats.bound}</b><span class="sep">|</span>已禁言 <b>${S.groupStats.muted}</b></div>
        <div class="sp"></div><button class="btn ghost" onclick="go('groups')">刷 新</button>
      </div>
      <div style="overflow-x:auto"><table>
        <thead><tr><th>群聊名称</th><th>类型</th><th>成员数</th><th>客户</th><th>审核员</th><th>发言</th><th>订单价格</th><th>下单时段</th><th>操作</th></tr></thead>
        <tbody>${rows||'<tr><td colspan="9" class="empty">暂无群聊</td></tr>'}</tbody>
      </table></div>
      <div class="pagefoot"><span>共 ${list.length} 个群聊</span><div class="pg"><span>1</span> 20 条/页</div></div>
    </div>
  </div>`;
}
async function toggleMute(id){
  try{ const d=await api('/api/groups/'+id+'/mute',{method:'POST',body:'{}'});
    const g=S.groups.find(x=>x.id===id); g.muted=d.muted?1:0;
    await ensureGroups(true); V().innerHTML=renderGroups(); toast(d.muted?'已禁言':'已恢复发言'); }
  catch(e){ toast(e.message,true); }
}
async function delGroup(id){
  if(!confirm('确认删除该群聊？')) return;
  try{ await api('/api/groups/'+id,{method:'DELETE'}); await ensureGroups(true); V().innerHTML=renderGroups(); toast('已删除'); }
  catch(e){ toast(e.message,true); }
}
function groupDetail(id){
  const g=S.groups.find(x=>x.id===id);
  const bound=S.customers.filter(c=>c.wx_group_name&&g.name.includes(c.wx_group_name));
  modal('群聊详情',
    `<div class="frow"><label>群聊名称</label><div>${esc(g.name)}</div></div>
     <div class="frow"><label>类型</label><div><span class="badge ${g.type==='微信'?'wx':'mail'}">${g.type}</span></div></div>
     <div class="frow"><label>成员数</label><div>${g.members||'—'}</div></div>
     <div class="frow"><label>审核员</label><div>${esc(g.reviewer)}</div></div>
     <div class="frow"><label>绑定客户</label><div>${bound.length?bound.map(c=>`<span class="badge processing" style="margin:0 6px 6px 0;display:inline-block">${esc(c.name)}</span>`).join(''):(g.customer_count+' 个客户')}</div></div>`,
    `<button class="btn pri" onclick="closeModal()">知道了</button>`);
}
function addEmailGroup(){
  modal('新增邮件群',
    `<div class="frow"><label>群名称</label><input class="ipt" id="mGName" placeholder="如：陈氏餐饮"></div>
     <div class="frow"><label>邮箱地址</label><input class="ipt" id="mGMail" placeholder="orders@example.com"></div>`,
    `<button class="btn ghost" onclick="closeModal()">取消</button><button class="btn pri" onclick="doAddEmailGroup()">确定</button>`);
}
async function doAddEmailGroup(){
  const name=document.getElementById('mGName').value.trim(), email=document.getElementById('mGMail').value.trim();
  if(!name||!email){ toast('请填写完整',true); return; }
  try{ await api('/api/groups/email',{method:'POST',body:JSON.stringify({name,email})}); closeModal(); await ensureGroups(true); V().innerHTML=renderGroups(); toast('已新增邮件群'); }
  catch(e){ toast(e.message,true); }
}

/* ============ 报价单 ============ */
let smFilter={keyword:'',status:''};
async function loadSalemenus(){
  const qs=new URLSearchParams(Object.entries(smFilter).filter(([k,v])=>v)).toString();

    <td>${s.id}</td>
    <td style="font-weight:500">${esc(s.name)}</td>
    <td>${s.customer_count?s.customer_count+' 个':'无'}</td>
    <td>${s.sku_count}</td>
    <td style="color:var(--t3)">${s.synced_at}</td>
    <td><span class="badge ${s.status==='启用'?'done':'gray'}">${s.status}</span></td>
    <td class="op-links"><a onclick="smDetail('${s.id}')">详情</a><a onclick="smToggle('${s.id}')">${s.status==='启用'?'禁用':'启用'}</a><a onclick="smSync('${s.id}')">同步</a></td>

  return `<div class="wrap">
    <div class="filters" style="grid-template-columns:1fr 1fr auto">

/* ---- GLM 浏览器直调 + 本地规则兜底解析 ---- */
async function glmChat(payload,timeoutMs){
  const ctl=new AbortController(); const t=setTimeout(()=>ctl.abort(),timeoutMs||45000);
  try{
    const r=await fetch(GLM.base+'/chat/completions',{method:'POST',signal:ctl.signal,
      headers:{'Authorization':'Bearer '+GLM.key,'Content-Type':'application/json'},body:JSON.stringify(payload)});
    if(!r.ok) throw new Error('GLM HTTP '+r.status);
    const d=await r.json(); return (d.choices[0].message.content||'').trim();
  }finally{ clearTimeout(t); }
}
function stripFence(s){ if(s.includes('```')) s=s.includes('```json')?s.split('```json').pop().split('```')[0]:s.split('```')[1]; return s.trim(); }
function fixName(n){ return RULES.correction_rules[n]||RULES.product_mapping[n]||n; }
function itemsFromLLM(st){
  return (st.items||[]).map((it,i)=>{
    let qty=it.quantity,price=it.price,total=it.total_price;
    if(total==null&&price!=null&&qty!=null){ const t=parseFloat(price)*parseFloat(qty); total=isNaN(t)?null:Math.round(t*100)/100; }
    const raw=it.product_name||'';
    return {seq:i+1,raw_text:raw,product_name:fixName(raw),qty:qty!=null?qty:'',unit:it.quantity_unit||'',
      price:price!=null?price:'',total:total!=null?total:'',remark:(it.notes||[]).join('；'),sku:'',warning:!raw};
  });
}
function localParse(text){
  const UNITS='斤|千克|公斤|kg|克|g|箱|袋|份|个|只|条|包|盒|瓶|扎|把|捆|块|桶|罐|件|组|篮|筐|提|打|听|支|根|颗|粒|张';
  const re=new RegExp('([\\u4e00-\\u9fa5A-Za-z]{1,12}?)\\s*[:：]?\\s*(\\d+(?:\\.\\d+)?)\\s*('+UNITS+')');
  const items=[];
  text.split(/[，,、;；。\n]+/).map(s=>s.trim()).filter(Boolean).forEach(seg=>{
    const m=seg.match(re);
    if(m){
      let price=null;
      const pm=seg.match(/(?:价格?|单价)\s*(\d+(?:\.\d+)?)\s*元?/)||seg.match(/(\d+(?:\.\d+)?)\s*元/);
      if(pm) price=parseFloat(pm[1]);
      items.push({product_name:m[1],quantity:parseFloat(m[2]),quantity_unit:m[3],price:price,total_price:null,notes:[]});
    }else if(items.length){
      const hit=items.find(it=>seg.includes(it.product_name));
      (hit||items[items.length-1]).notes.push(seg);
    }
  });
  return {items};
}
const TEXT_PROMPT='你是订单识别专家。从用户下单文本中提取所有商品信息。\n严格只输出 JSON，格式：\n{"items":[{"product_name":"商品名","quantity":数量数字,"quantity_unit":"单位","price":单价或null,"total_price":总价或null,"notes":["备注"]}]}\n数量单位保留原文（斤/千克/箱/袋/份等）。口语备注（如“切片”“要新鲜的”）放进对应商品 notes。识别不到商品时输出 {"items":[]}';
const MOCK_VLM_PROMPT='你是订单识别专家。请识别图片中的订单/菜单/清单内容，提取所有商品信息。\n严格只输出 JSON，格式：\n{"items":[{"product_name":"商品名","quantity":数量数字,"quantity_unit":"单位","price":单价或null,"total_price":总价或null,"notes":["备注"]}]}\n数量单位保留原文（斤/千克/箱/袋/份等）。识别不到商品时输出 {"items":[]}';
async function recognizeText(text){
  let st=null;
  try{
    const ans=await glmChat({model:'glm-4-flash',temperature:0.1,max_tokens:1000,
      messages:[{role:'user',content:TEXT_PROMPT+'\n\n用户文本：\n'+text}]});
    st=JSON.parse(stripFence(ans));
    if(Array.isArray(st)) st={items:st};
  }catch(e){ st=localParse(text); }
  if(!st||!Array.isArray(st.items)) st=localParse(text);
  return itemsFromLLM(st);
}
function fileToB64(f){ return new Promise((res,rej)=>{ const r=new FileReader();
  r.onload=()=>res(String(r.result).split(',')[1]); r.onerror=()=>rej(new Error('文件读取失败')); r.readAsDataURL(f); }); }
async function recognizeImage(f){
  const b64=await fileToB64(f);
  const ans=await glmChat({model:'glm-4v-flash',temperature:0.1,max_tokens:1024,
    messages:[{role:'user',content:[{type:'image_url',image_url:{url:b64}},{type:'text',text:MOCK_VLM_PROMPT}]}]},60000);
  let st;
  try{ st=JSON.parse(stripFence(ans)); if(Array.isArray(st)) st={items:st}; }catch(e){ st={items:[]}; }
  return itemsFromLLM(st);
}
function loadXLSX(){
  if(window.XLSX) return Promise.resolve();
  return new Promise((res,rej)=>{ const s=document.createElement('script');
    s.src='https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js';
    s.onload=res; s.onerror=()=>rej(new Error('无法加载 Excel 解析组件（网络受限），请改用文字或图片下单'));
    document.head.appendChild(s); });
}
async function excelToText(f){
  await loadXLSX();
  const buf=await f.arrayBuffer();
  const wb=XLSX.read(buf,{type:'array'});
  const ws=wb.Sheets[wb.SheetNames[0]];
  const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
  return rows.map(r=>r.map(v=>String(v).trim()).filter(Boolean).join(' ')).filter(Boolean).slice(0,60).join('\n');
}
