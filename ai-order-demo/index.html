  memory:'AI 记忆：AI 越用越准的秘密。按客户维度统计商品修正/习惯/常买记录；点详情可看真实生效的修正规则（如“九王→韭黄”，存在 rules.json，识别时精确替换）和近期任务。',
  settings:'设置：系统配置中心。成员管理（增删操作员/改密码）；信道开关（微信机器人/邮件/API）；自动回复模板（下单成功后回什么话）；通知开关。所有开关真实持久化。'};
const MOCK_DOC='「鲜达 AI 智能订单助手」是一个生鲜 B2B SaaS 智能录单产品原型：客户在微信群里发一句话/一张图/一个 Excel，AI 自动识别成结构化订单，人工审核后一键下单生成鲜达单号。\n核心流程：订单录入（选客户→发消息→AI识别）→ 订单审核（筛选/合单/重识别）→ 任务详情（编辑商品→确认下单→出鲜达单号）。\n技术：文本识别走 GLM-4-flash，图片识别走 GLM-4V-flash 视觉模型，Excel 走前端解析+LLM；静态演示模式下数据存浏览器 localStorage 真实持久化。\n60秒演示路径：首页→订单录入→选「张三大排档」→输入“牛肉20斤价格42元，啤酒5箱，记得牛肉切片”→发送→去审核→改数量→全部确认下单→回列表看已完成+鲜达单号。\n各页面说明：\n'+Object.values(MOCK_GUIDE).map(v=>'- '+v).join('\n');

/* ---- mock 路由：与后端 25+ 接口同形状 ---- */
async function mockApi(path,opts){
  const method=(opts.method||'GET').toUpperCase();
  const u=new URL(path,'http://m');
  const p=u.pathname.replace(/^\/api/,'');
  const q=u.searchParams;
  const fd=opts.body instanceof FormData?opts.body:null;
  const body=(!fd&&opts.body)?JSON.parse(opts.body):{};
  let m;

  /* 客户 */
  if(method==='GET'&&p==='/customers'){
    const kw=q.get('keyword')||'',bind=q.get('bind')||'',pr=q.get('priority')||'';
    const list=DB.customers.filter(c=>(!kw||c.name.includes(kw)||c.customer_id.includes(kw))
      &&(bind!=='bound'||c.wx_group_name!=='')&&(bind!=='unbound'||c.wx_group_name==='')
      &&(!pr||c.priority===pr)).slice().sort((a,b)=>a.customer_id<b.customer_id?-1:1);
    return {customers:C(list),operators:['未分配'].concat(DB.operators.filter(o=>o.enabled).map(o=>o.display_name)),
      stats:{total:DB.customers.length,bound:DB.customers.filter(c=>c.wx_group_name).length,synced:DB.customers.length}};
  }
  if(method==='PUT'&&p==='/customers/priority'){
    (body.customer_ids||[]).forEach(cid=>{ const c=DB.customers.find(x=>x.customer_id===cid); if(c) c.priority=body.priority; });
    saveDB(); return {success:true,count:(body.customer_ids||[]).length};
  }

  /* 任务 */
  if(method==='POST'&&p==='/tasks'){
    if(!(body.text||'').trim()) throw new Error('内容不能为空');
    const items=await recognizeText(body.text);
    return finishTask(body.wx_group_name||'',body.customer_id||'',body.customer_name,body.text,'',items);
  }
  if(method==='POST'&&p==='/tasks/upload'){
    const f=fd.get('file');
    const fname=(f&&f.name)||'上传文件';
    if(f&&f.size>15*1024*1024) throw new Error('文件过大（≤15MB）');
    const ext=(fname.match(/\.[^.]+$/)||[''])[0].toLowerCase();
    let raw='',items=[];
    if(['.jpg','.jpeg','.png','.bmp','.webp'].includes(ext)){ items=await recognizeImage(f); raw='[图片] '+fname; }
    else if(['.xlsx','.xls'].includes(ext)){ const text=await excelToText(f); raw=text.slice(0,800); items=await recognizeText(text); }
    else throw new Error('暂支持图片(jpg/png/webp)与Excel(xlsx/xls)；PDF识别开发中');
    return finishTask(fd.get('wx_group_name')||'',fd.get('customer_id')||'',fd.get('customer_name')||'',raw,fname,items);
  }
  if(method==='POST'&&p==='/tasks/merge'){
    const ids=body.task_ids||[];
    if(ids.length<2) throw new Error('请选择至少 2 个任务进行合单');
    const rows=ids.map(id=>DB.tasks.find(t=>t.id===id)).filter(Boolean);
    if(rows.length<2) throw new Error('任务不存在或已被删除');
    if(rows.some(r=>r.status!=='pending'&&r.status!=='failed')) throw new Error('只能合并「待处理/失败」状态的任务');
    const allGroups=[],msgs=[];
    rows.forEach(r=>{ allGroups.push(...C(r.groups||[])); if(r.original_message) msgs.push('【'+r.customer_name+'】'+r.original_message); });
    const first=rows[0];
    const t={id:mkId(),status:'pending',created_at:fmtDate(new Date()),wx_group_name:first.wx_group_name,
      customer_id:first.customer_id,customer_name:first.customer_name+' 等'+rows.length+'单合并',operator:'未分配',reviewer:'',
      original_message:msgs.join('\n---\n'),original_file:'',xd_order_no:'',product_count:countItems(allGroups),groups:allGroups};
    DB.tasks.push(t); rows.forEach(r=>r.status='merged'); saveDB();
    return {success:true,task:taskOut(t,true)};
  }
  if(method==='GET'&&p==='/tasks'){
    const g=k=>q.get(k)||'';
    const st=g('status'),cu=g('customer'),gr=g('group'),rv=g('reviewer'),kw=g('keyword'),df=g('date_from'),dt=g('date_to');
    const list=DB.tasks.filter(t=>(!st||t.status===st)&&(!cu||t.customer_name.includes(cu))&&(!gr||(t.wx_group_name||'').includes(gr))
      &&(!rv||t.operator===rv)
      &&(!kw||(t.original_message||'').includes(kw)||(t.xd_order_no||'').includes(kw)||t.customer_name.includes(kw))
      &&(!df||t.created_at>=df+' 00:00:00')&&(!dt||t.created_at<=dt+' 23:59:59'))
      .slice().sort((a,b)=>a.created_at<b.created_at?1:-1);
    const n=s=>DB.tasks.filter(t=>t.status===s).length;
    return {tasks:list.map(t=>taskOut(t)),stats:{total:DB.tasks.length,pending:n('pending'),done:n('done'),failed:n('failed'),merged:n('merged')}};
  }
  if((m=p.match(/^\/tasks\/([^/]+)$/))){
    if(method==='GET'){ return taskOut(findTask(m[1]),true); }
    if(method==='PUT'){
      const t=findTask(m[1]);
      t.groups=body.groups||[]; t.product_count=countItems(t.groups);
      if(body.operator!=null) t.operator=body.operator;
      saveDB(); return taskOut(t,true);
    }
    if(method==='DELETE'){ DB.tasks=DB.tasks.filter(t=>t.id!==m[1]); saveDB(); return {success:true}; }
  }
  if((m=p.match(/^\/tasks\/([^/]+)\/confirm$/))&&method==='POST'){
    const t=findTask(m[1]);
    const groups=t.groups||[];
    if(!groups.length) throw new Error('没有可下单的订单分组');
    const targets=body.group_index==null?groups.map((_,i)=>i):[body.group_index];
    targets.forEach(gi=>{ if(gi>=0&&gi<groups.length) groups[gi].status='已提交'; });
    const allDone=groups.every(g=>g.status==='已提交');
    if(allDone){ t.status='done'; if(!t.xd_order_no) t.xd_order_no=xdNo(); }
    saveDB(); return {success:true,all_done:allDone,task:taskOut(t,true)};
  }
  if((m=p.match(/^\/tasks\/([^/]+)\/reidentify$/))&&method==='POST'){
    const t=findTask(m[1]);
    const items=await recognizeText(t.original_message||'');
    t.groups=items.length?[defaultGroup(t.customer_name,t.customer_id,items)]:[];
    t.status=items.length?'pending':'failed';
    t.product_count=countItems(t.groups); t.xd_order_no='';
    saveDB(); return {success:items.length>0,task:taskOut(t,true)};
  }

  /* 群聊 */
  if(method==='GET'&&p==='/groups'){
    const ty=q.get('type')||'',rv=q.get('reviewer')||'';
    const list=DB.groups.filter(g=>(!ty||g.type===ty)&&(!rv||g.reviewer.includes(rv)));
    return {groups:C(list),stats:{total:DB.groups.length,bound:DB.groups.length,muted:DB.groups.filter(g=>g.muted).length}};
  }
  if((m=p.match(/^\/groups\/(\d+)\/mute$/))&&method==='POST'){
    const g=DB.groups.find(x=>x.id===+m[1]); if(!g) throw new Error('群聊不存在');
    g.muted=g.muted?0:1; saveDB(); return {success:true,muted:!!g.muted};
  }
  if((m=p.match(/^\/groups\/(\d+)$/))&&method==='DELETE'){
    DB.groups=DB.groups.filter(g=>g.id!==+m[1]); saveDB(); return {success:true};
  }
  if(method==='POST'&&p==='/groups/email'){
    DB.groups.push({id:DB.nextGroupId++,name:body.name+'/'+body.email,type:'邮件',members:0,customer_count:0,reviewer:'全部操作员',muted:0});
    saveDB(); return {success:true};
  }

  /* 报价单 */
  if(method==='GET'&&p==='/salemenus'){
    const kw=q.get('keyword')||'',st=q.get('status')||'';
    const list=DB.salemenus.filter(s=>(!kw||s.name.includes(kw)||s.id.includes(kw))&&(!st||s.status===st));
    return {salemenus:C(list),stats:{total:DB.salemenus.length,active:DB.salemenus.filter(s=>s.status==='启用').length,
      customers:24,sku:DB.salemenus.reduce((a,s)=>a+s.sku_count,0)}};
  }
  if((m=p.match(/^\/salemenus\/([^/]+)\/sync$/))&&method==='POST'){
    const s=DB.salemenus.find(x=>x.id===m[1]); if(!s) throw new Error('报价单不存在');
    s.synced_at=fmtDate(new Date()); saveDB(); return {success:true,synced_at:s.synced_at};
  }
  if((m=p.match(/^\/salemenus\/([^/]+)\/toggle$/))&&method==='POST'){
    const s=DB.salemenus.find(x=>x.id===m[1]); if(!s) throw new Error('报价单不存在');
    s.status=s.status==='启用'?'停用':'启用'; saveDB(); return {success:true,status:s.status};
  }

  /* 提示词 */
  if(method==='GET'&&p==='/prompts'){
    const ty=q.get('type')||'';
    const list=DB.prompts.filter(x=>!ty||x.type===ty).slice().sort((a,b)=>a.updated_at<b.updated_at?1:-1);
    return {prompts:C(list)};
  }
  if(method==='POST'&&p==='/prompts'){
    DB.prompts.push({id:DB.nextPromptId++,name:body.name,type:body.type||'订单解析',bound:body.bound||'全部客户',
      enabled:1,content:body.content||'',updated_at:fmtDate(new Date())});
    saveDB(); return {success:true};
  }
  if((m=p.match(/^\/prompts\/(\d+)$/))){
    if(method==='PUT'){
      const x=DB.prompts.find(o=>o.id===+m[1]);
      if(x){ x.name=body.name; x.type=body.type||'订单解析'; x.bound=body.bound||'全部客户'; x.content=body.content||''; x.updated_at=fmtDate(new Date()); }
      saveDB(); return {success:true};
    }
    if(method==='DELETE'){ DB.prompts=DB.prompts.filter(o=>o.id!==+m[1]); saveDB(); return {success:true}; }
  }
  if((m=p.match(/^\/prompts\/(\d+)\/toggle$/))&&method==='POST'){
    const x=DB.prompts.find(o=>o.id===+m[1]); if(!x) throw new Error('模板不存在');
    x.enabled=x.enabled?0:1; saveDB(); return {success:true,enabled:!!x.enabled};
  }

  /* AI 记忆 */
  if(method==='GET'&&p==='/memory'){
    const out=[];
    DB.customers.slice().sort((a,b)=>a.customer_id<b.customer_id?-1:1).forEach(c=>{
      const mm=MOCK_MEM[c.customer_id];
      const mine=DB.tasks.filter(t=>t.customer_id===c.customer_id);
      const local=mine.filter(t=>t.status!=='merged').length;
      if(!mm&&!local) return;
      const [fix,habit,fav,hist]=mm||[0,0,0,0];
      const lt=mine.length?mine.map(t=>t.created_at).sort().pop():'07-02 13:58';
      const disp=lt.length>12?lt.slice(5,16):lt;
      out.push({customer_id:c.customer_id,customer_name:c.name,fix,habit,fav,orders:hist+local,last_order:disp,updated:disp});
    });
    return {memory:out};
  }
  if((m=p.match(/^\/memory\/([^/]+)$/))&&method==='GET'){
    const c=DB.customers.find(x=>x.customer_id===m[1]);
    const recent=DB.tasks.filter(t=>t.customer_id===m[1]).slice()
      .sort((a,b)=>a.created_at<b.created_at?1:-1).slice(0,8)
      .map(t=>({created_at:t.created_at,product_count:t.product_count,status:t.status,xd_order_no:t.xd_order_no||''}));
    return {customer_id:m[1],customer_name:c?c.name:m[1],
      product_mapping:C(RULES.product_mapping),correction_rules:C(RULES.correction_rules),
      habits:['工作日 07:00 前下单居多','常用单位：斤 / 箱','价格敏感：低（很少议价）'],
      favorites:['土豆','西红柿','五花肉','大白菜','鸡蛋'],recent_tasks:recent};
  }

  /* 设置 */
  if(method==='GET'&&p==='/settings'){
    return {settings:C(DB.settings),operators:C(DB.operators.slice().sort((a,b)=>a.username<b.username?-1:1))};
  }
  if(method==='PUT'&&p==='/settings'){ DB.settings=body.settings||DB.settings; saveDB(); return {success:true}; }
  if(method==='POST'&&p==='/operators'){
    if(DB.operators.some(o=>o.username===body.username)) throw new Error('用户名已存在');
    DB.operators.push({username:body.username,display_name:body.display_name,role:body.role||'操作员',enabled:1});
    saveDB(); return {success:true};
  }
  if((m=p.match(/^\/operators\/([^/]+)$/))&&method==='DELETE'){
    if(m[1]==='admin') throw new Error('不能删除管理员');
    DB.operators=DB.operators.filter(o=>o.username!==decodeURIComponent(m[1]));
    saveDB(); return {success:true};
  }

  /* 智能问答 */
  if(method==='POST'&&p==='/assistant'){
    const tip=MOCK_GUIDE[body.page]||MOCK_GUIDE.home;
    try{
      const msgs=[{role:'system',content:'你是「鲜达 AI 智能订单助手」产品原型的内置导览助手，负责向体验者介绍每个页面是做什么的、怎么用。\n以下是产品完整说明：\n'+MOCK_DOC+'\n用户当前正停留在的页面：'+tip+'\n回答要求：中文、口语化、简洁（3~6句话为宜），优先结合用户当前页面回答；可以用少量换行分点；只基于以上说明回答，说明里没有的就坦率说这个原型没有该功能。'}];
      (body.history||[]).slice(-6).forEach(h=>{ if((h.role==='user'||h.role==='assistant')&&h.content) msgs.push({role:h.role,content:String(h.content).slice(0,500)}); });
      msgs.push({role:'user',content:String(body.question||'').slice(0,500)});
      const answer=await glmChat({model:'glm-4-flash',messages:msgs,temperature:0.3,max_tokens:600});
      return {success:true,answer};
    }catch(e){
      return {success:true,answer:'（离线模式）'+tip+'\n\n更多用法可点右下角「帮助文档」查看完整手册。'};
    }
  }

  throw new Error('接口未实现：'+method+' '+p);
}
function findTask(tid){ const t=DB.tasks.find(x=>x.id===tid); if(!t) throw new Error('任务不存在'); return t; }
function taskOut(t,full){
  const o={id:t.id,status:t.status,created_at:t.created_at,wx_group_name:t.wx_group_name,customer_id:t.customer_id,
    customer_name:t.customer_name,operator:t.operator,reviewer:t.reviewer,xd_order_no:t.xd_order_no||'',
    product_count:t.product_count,original_message:t.original_message||'',original_file:t.original_file||''};
  if(full) o.groups=C(t.groups||[]);
  return o;
}
function finishTask(grp,cid,cname,msg,fname,items){
  const status=items.length?'pending':'failed';
  const groups=items.length?[defaultGroup(cname,cid,items)]:[];
  const t={id:mkId(),status,created_at:fmtDate(new Date()),wx_group_name:grp,customer_id:cid,customer_name:cname,
    operator:'未分配',reviewer:'',original_message:msg,original_file:fname,xd_order_no:'',
    product_count:countItems(groups),groups};
  DB.tasks.push(t); saveDB();
  return {success:items.length>0,task:taskOut(t,true)};
}

/* 静态演示版：无后端可探测，直接进入浏览器内模拟数据层（避免加载期对不存在的 /api/health 发起请求产生控制台错误） */
(async function boot(){
  let ok=false;
  if(!ok){
    window.MOCK=true; initMockDB();
    const b=document.querySelector('.topbar .brand');
    if(b) b.insertAdjacentHTML('afterend','<span style="margin-left:8px;background:#fef3c7;color:#92400e;border-radius:10px;padding:2px 8px;font-size:11px;font-weight:600;white-space:nowrap">静态演示模式</span>');
  }
  go('home');
})();
</script>
